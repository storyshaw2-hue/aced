<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ACED">
  <rect width="64" height="64" rx="10" fill="#070b08"/>
  <rect x="3" y="3" width="58" height="58" rx="8" fill="none" stroke="#16291a" stroke-width="2"/>
  <!-- pixel "A" -->
  <g fill="#22ff66">
    <rect x="16" y="14" width="8" height="8"/>
    <rect x="24" y="14" width="8" height="8"/>
    <rect x="12" y="22" width="8" height="8"/>
    <rect x="28" y="22" width="8" height="8"/>
    <rect x="12" y="30" width="8" height="8"/>
    <rect x="20" y="30" width="8" height="8"/>
    <rect x="28" y="30" width="8" height="8"/>
    <rect x="12" y="38" width="8" height="8"/>
    <rect x="28" y="38" width="8" height="8"/>
  </g>
  <!-- blinking terminal cursor -->
  <rect x="42" y="38" width="9" height="9" fill="#ffd23f">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
