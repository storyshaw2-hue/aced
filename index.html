<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>ACED // CPA Roguelike</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e07;
    --bg-2:#0d1409;
    --panel:#0e1a0d;
    --panel-2:#13230f;
    --crt-green:#22ff66;
    --crt-green-dim:#0fa84a;
    --crt-amber:#ffb627;
    --crt-red:#ff3838;
    --crt-cyan:#5cffea;
    --crt-magenta:#ff5cb8;
    --crt-white:#d8f5d8;
    --crt-grey:#5a7058;
    --crt-purple:#a855f7;
    --crt-blue:#5cb8ff;
    --border:#1a2e15;
    --gold:#ffd23f;
  }
  *{box-sizing:border-box;image-rendering:pixelated}
  html,body{margin:0;padding:0;background:#000;color:var(--crt-green);font-family:'VT323',monospace;font-size:20px;line-height:1.25;overflow-x:hidden}
  body{
    background:
      radial-gradient(ellipse at center, var(--bg-2) 0%, #000 100%),
      var(--bg);
    min-height:100vh;
    position:relative;
  }
  body::before{
    content:"";
    position:fixed;inset:0;pointer-events:none;z-index:100;
    background:repeating-linear-gradient(
      0deg,
      rgba(0,0,0,.15) 0px,
      rgba(0,0,0,.15) 1px,
      transparent 1px,
      transparent 3px
    );
  }
  body::after{
    content:"";
    position:fixed;inset:0;pointer-events:none;z-index:99;
    background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.55) 100%);
  }
  /* Layout */
  .wrap{max-width:1280px;margin:0 auto;padding:14px 16px 80px;position:relative;z-index:1}
  .topbar{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:14px}
  .logo{font-family:'Press Start 2P',monospace;font-size:20px;color:var(--crt-green);text-shadow:0 0 8px var(--crt-green);letter-spacing:2px}
  .logo .small{font-size:10px;color:var(--crt-amber);text-shadow:0 0 4px var(--crt-amber);margin-left:10px}
  .topbar .nav{display:flex;gap:8px}
  button{font-family:'Press Start 2P',monospace;font-size:10px;background:#0a160a;color:var(--crt-green);border:1px solid var(--crt-green-dim);padding:8px 12px;cursor:pointer;letter-spacing:1px;border-radius:0;text-shadow:0 0 4px var(--crt-green)}
  button:hover{background:#0f2a14;border-color:var(--crt-green);box-shadow:0 0 8px var(--crt-green)}
  button:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
  button.amber{color:var(--crt-amber);border-color:#a06e0f;text-shadow:0 0 4px var(--crt-amber)}
  button.amber:hover{background:#1a1208;border-color:var(--crt-amber);box-shadow:0 0 8px var(--crt-amber)}
  button.red{color:var(--crt-red);border-color:#7a1818;text-shadow:0 0 4px var(--crt-red)}
  button.red:hover{background:#1a0808;border-color:var(--crt-red);box-shadow:0 0 8px var(--crt-red)}
  button.big{font-size:14px;padding:12px 20px}
  h1,h2,h3{font-family:'Press Start 2P',monospace;letter-spacing:1px;margin:0 0 10px}
  h2{font-size:14px;color:var(--crt-amber);text-shadow:0 0 6px var(--crt-amber)}
  h3{font-size:11px;color:var(--crt-cyan);text-shadow:0 0 4px var(--crt-cyan)}

  .panel{border:1px solid var(--border);background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);padding:14px;margin-bottom:14px;position:relative}
  .panel::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--crt-green-dim),transparent)}

  /* HUD */
  .hud{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:12px}
  @media (max-width: 760px){ .hud{grid-template-columns:repeat(4,1fr)} }
  .streak-val{transition:transform .12s,color .12s,text-shadow .12s}
  .streak-val.pulse{animation:streakPulse .4s ease-out}
  @keyframes streakPulse{0%{transform:scale(1)}40%{transform:scale(1.4)}100%{transform:scale(1)}}
  .streak-val.tier1{color:var(--crt-green)!important;text-shadow:0 0 6px var(--crt-green)!important}
  .streak-val.tier2{color:var(--crt-amber)!important;text-shadow:0 0 8px var(--crt-amber)!important}
  .streak-val.tier3{color:var(--crt-magenta)!important;text-shadow:0 0 10px var(--crt-magenta)!important}
  .streak-val.tier4{color:var(--crt-red)!important;text-shadow:0 0 12px var(--crt-red)!important;animation:streakBurn 1s infinite}
  .streak-val.tier5{color:var(--gold)!important;text-shadow:0 0 16px var(--gold)!important;animation:streakBurn .6s infinite}
  @keyframes streakBurn{0%,100%{filter:brightness(1)}50%{filter:brightness(1.6)}}
  .stat{border:1px solid var(--border);background:#06100a;padding:8px 10px}
  .stat .lbl{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--crt-grey);letter-spacing:1px;margin-bottom:4px}
  .stat .val{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--crt-green);text-shadow:0 0 4px var(--crt-green)}
  .stat.amber .val{color:var(--crt-amber);text-shadow:0 0 4px var(--crt-amber)}
  .stat.red .val{color:var(--crt-red);text-shadow:0 0 4px var(--crt-red)}
  .stat.cyan .val{color:var(--crt-cyan);text-shadow:0 0 4px var(--crt-cyan)}
  .stat.gold .val{color:var(--gold);text-shadow:0 0 4px var(--gold)}


  /* === CONFIDENCE PICKER === */
  .conf-picker{margin:16px 0 8px;padding:14px;border:2px solid var(--gold);background:#0f1408;box-shadow:0 0 12px rgba(255,210,63,0.25)}
  .conf-picker .conf-label{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--gold);letter-spacing:2px;text-shadow:0 0 4px var(--gold);margin-bottom:10px;text-align:center}
  .conf-picker .conf-tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .conf-tier{border:2px solid var(--border);background:#0a1408;padding:10px 8px;cursor:pointer;text-align:center;transition:all 0.15s;font-family:'VT323',monospace}
  .conf-tier:hover{transform:translateY(-2px);box-shadow:0 4px 0 var(--crt-green-dim)}
  .conf-tier.tier-LOW:hover{border-color:var(--crt-cyan);box-shadow:0 0 10px var(--crt-cyan)}
  .conf-tier.tier-MED:hover{border-color:var(--crt-amber);box-shadow:0 0 10px var(--crt-amber)}
  .conf-tier.tier-HIGH:hover{border-color:var(--crt-red);box-shadow:0 0 10px var(--crt-red)}
  .conf-tier .conf-emoji{font-size:24px;display:block;margin-bottom:4px}
  .conf-tier .conf-pct{font-family:'Press Start 2P',monospace;font-size:11px;letter-spacing:1px;display:block}
  .conf-tier.tier-LOW  .conf-pct{color:var(--crt-cyan)}
  .conf-tier.tier-MED  .conf-pct{color:var(--crt-amber)}
  .conf-tier.tier-HIGH .conf-pct{color:var(--crt-red)}
  .conf-tier .conf-text{font-size:15px;color:var(--crt-white);margin-top:4px;display:block}
  .conf-tier .conf-mult{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--gold);margin-top:6px;display:block}
  .conf-tier .conf-risk{font-size:13px;color:var(--crt-grey);margin-top:4px;line-height:1.2;min-height:30px;display:block}
  .conf-locked{margin:10px 0;padding:8px 10px;border:1px solid var(--gold);background:#1a1408;font-family:'VT323',monospace;color:var(--gold);font-size:16px;text-align:center}
  .conf-locked .conf-mini-emoji{font-size:18px;margin-right:6px}
  .conf-stat{font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:1px;color:var(--gold)}

  /* Blind banner */
  .blind-banner{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--border);background:#040904;margin-bottom:12px}
  .blind-banner .type{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--crt-amber);text-shadow:0 0 6px var(--crt-amber)}
  .blind-banner.boss .type{color:var(--crt-purple);text-shadow:0 0 6px var(--crt-purple)}
  .blind-banner.big .type{color:var(--crt-cyan);text-shadow:0 0 6px var(--crt-cyan)}
  .blind-banner .target{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--crt-white)}
  .blind-banner .mut{font-family:'VT323',monospace;font-size:17px;color:var(--crt-magenta);text-shadow:0 0 4px var(--crt-magenta)}

  /* Score display - the heart of the dopamine loop */
  .score-box{display:grid;grid-template-columns:1fr auto 1fr;gap:0;border:2px solid var(--crt-amber);background:#0a0604;padding:14px;margin-bottom:14px;align-items:center;box-shadow:0 0 14px rgba(255,182,39,.2) inset}
  .score-side{text-align:center}
  .score-side .lbl{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--crt-grey);letter-spacing:1px;margin-bottom:6px}
  .score-side.k .val{font-family:'Press Start 2P',monospace;font-size:24px;color:var(--crt-cyan);text-shadow:0 0 8px var(--crt-cyan)}
  .score-side.c .val{font-family:'Press Start 2P',monospace;font-size:24px;color:var(--crt-magenta);text-shadow:0 0 8px var(--crt-magenta)}
  .score-times{font-family:'Press Start 2P',monospace;font-size:22px;color:var(--crt-amber);text-shadow:0 0 6px var(--crt-amber);padding:0 18px}
  .score-total{text-align:center;margin-top:8px;font-family:'Press Start 2P',monospace;font-size:14px;color:var(--gold);text-shadow:0 0 8px var(--gold)}

  /* Cards - the hand */
  .hand-area{display:flex;flex-direction:column;gap:10px}
  .hand-info{display:flex;justify-content:space-between;align-items:center;font-family:'VT323',monospace;font-size:17px;color:var(--crt-grey)}
  .hand-info .combo{color:var(--crt-amber);text-shadow:0 0 4px var(--crt-amber);font-family:'Press Start 2P',monospace;font-size:10px;letter-spacing:1px}
  .cards{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:8px 0;min-height:200px}
  .card{
    width:128px;min-height:184px;border:2px solid var(--crt-green-dim);background:linear-gradient(180deg,#0a160a 0%,#040904 100%);
    padding:8px;cursor:pointer;position:relative;transition:transform .12s,border-color .12s,box-shadow .12s;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .card:hover{transform:translateY(-6px);border-color:var(--crt-green);box-shadow:0 0 12px var(--crt-green)}
  .card.selected{transform:translateY(-14px);border-color:var(--crt-amber);box-shadow:0 0 16px var(--crt-amber)}
  .card.scoring{border-color:var(--gold);box-shadow:0 0 20px var(--gold);animation:flash .35s ease-out}
  @keyframes flash{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
  .card .rank{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--crt-amber);text-shadow:0 0 4px var(--crt-amber)}
  .card .suit-icon{font-family:'Press Start 2P',monospace;font-size:14px;text-shadow:0 0 6px currentColor}
  .card .topic{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--crt-cyan);text-shadow:0 0 3px var(--crt-cyan);letter-spacing:1px;line-height:1.4;text-align:center;margin:4px 0}
  .card .question-preview{font-family:'VT323',monospace;font-size:13px;color:var(--crt-white);line-height:1.2;text-align:center;flex:1;display:flex;align-items:center;justify-content:center;padding:2px}
  .card .footer{display:flex;justify-content:space-between;align-items:center;font-family:'Press Start 2P',monospace;font-size:8px}
  .card .chips{color:var(--crt-cyan);text-shadow:0 0 4px var(--crt-cyan)}
  .card .mult{color:var(--crt-magenta);text-shadow:0 0 4px var(--crt-magenta)}
  /* Suit colors for top-right icon */
  .card[data-suit="FAR"] .suit-icon{color:var(--crt-green)}
  .card[data-suit="AUD"] .suit-icon{color:var(--crt-cyan)}
  .card[data-suit="REG"] .suit-icon{color:var(--crt-amber)}
  .card[data-suit="BAR"] .suit-icon{color:var(--crt-magenta)}

  /* Actions */
  .action-row{display:flex;gap:10px;justify-content:center;padding:14px 0;flex-wrap:wrap}
  .action-row button{font-size:11px;padding:10px 18px}

  /* Question modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{max-width:760px;width:100%;border:2px solid var(--crt-amber);background:#06100a;padding:18px;box-shadow:0 0 24px rgba(255,182,39,.3)}
  .modal h2{margin-bottom:14px}
  .qprompt{font-family:'VT323',monospace;font-size:20px;color:var(--crt-white);line-height:1.4;margin-bottom:14px;padding:12px;background:#040904;border-left:3px solid var(--crt-cyan)}
  .qchoices{display:flex;flex-direction:column;gap:8px}
  .qchoice{display:flex;gap:10px;padding:10px 12px;border:1px solid var(--border);background:#0a160a;cursor:pointer;font-family:'VT323',monospace;font-size:17px;color:var(--crt-white);transition:all .12s}
  .qchoice:hover{border-color:var(--crt-amber);background:#1a1208}
  .qchoice .letter{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--crt-amber);min-width:18px}
  .qchoice.right{border-color:var(--crt-green);background:#0a1f12;box-shadow:0 0 12px var(--crt-green);color:var(--crt-green)}
  .qchoice.wrong{border-color:var(--crt-red);background:#1a0808;box-shadow:0 0 12px var(--crt-red);color:var(--crt-red)}
  .qchoice.right .letter{color:var(--crt-green)}
  .qchoice.wrong .letter{color:var(--crt-red)}
  .explain{margin-top:14px;padding:12px 14px;background:#000;border-left:3px solid var(--crt-amber);font-family:'VT323',monospace;font-size:17px;line-height:1.45;color:var(--crt-white)}
  .explain .verdict{font-family:'Press Start 2P',monospace;font-size:10px;display:block;margin-bottom:6px}
  .explain .verdict.good{color:var(--crt-green);text-shadow:0 0 4px var(--crt-green)}
  .explain .verdict.bad{color:var(--crt-red);text-shadow:0 0 4px var(--crt-red)}

  /* Advisors panel (the joker rail) */
  .advisors{display:flex;gap:8px;flex-wrap:wrap;min-height:90px;padding:8px;border:1px dashed var(--border);background:#020602}
  .advisor{
    width:140px;min-height:84px;border:1px solid var(--crt-amber);background:linear-gradient(180deg,#1a1208 0%,#0a0604 100%);
    padding:8px;font-family:'VT323',monospace;font-size:15px;color:var(--crt-white);position:relative;
    box-shadow:0 0 8px rgba(255,182,39,.15);
  }
  .advisor .name{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--crt-amber);text-shadow:0 0 4px var(--crt-amber);letter-spacing:1px;margin-bottom:4px}
  .advisor .effect{font-size:13px;color:var(--crt-white);line-height:1.25}
  .advisor.cursed{border-color:var(--crt-red);box-shadow:0 0 8px rgba(255,56,56,.2)}
  .advisor.cursed .name{color:var(--crt-red);text-shadow:0 0 4px var(--crt-red)}
  .advisor.rare{border-color:var(--crt-magenta);box-shadow:0 0 8px rgba(255,92,184,.25)}
  .advisor.rare .name{color:var(--crt-magenta);text-shadow:0 0 4px var(--crt-magenta)}
  .advisor.triggering{animation:trigger .4s ease-out;border-color:var(--gold);box-shadow:0 0 18px var(--gold)}
  @keyframes trigger{0%{transform:scale(1)}50%{transform:scale(1.15) rotate(-2deg)}100%{transform:scale(1)}}
  .advisor .sell{position:absolute;top:2px;right:2px;font-family:'Press Start 2P',monospace;font-size:8px;color:var(--crt-grey);cursor:pointer;padding:2px 4px;background:#000}
  .advisor .sell:hover{color:var(--crt-red)}

  /* Shop */
  .shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
  .shop-item{border:1px solid var(--border);background:#0a160a;padding:10px;cursor:pointer;position:relative}
  .shop-item:hover{border-color:var(--crt-amber);box-shadow:0 0 8px var(--crt-amber)}
  .shop-item.sold{opacity:.3;pointer-events:none}
  .shop-item .price{position:absolute;top:4px;right:6px;font-family:'Press Start 2P',monospace;font-size:9px;color:var(--gold);text-shadow:0 0 4px var(--gold)}
  .shop-item .item-name{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--crt-amber);text-shadow:0 0 4px var(--crt-amber);letter-spacing:1px;margin-bottom:6px;padding-right:30px}
  .shop-item .item-desc{font-family:'VT323',monospace;font-size:14px;color:var(--crt-white);line-height:1.25}

  /* Score popups */
  .popup-layer{position:fixed;inset:0;pointer-events:none;z-index:150}
  .popup{position:absolute;font-family:'Press Start 2P',monospace;font-size:14px;animation:popupFloat 1.2s ease-out forwards;text-shadow:0 0 6px currentColor}
  .popup.chips{color:var(--crt-cyan)}
  .popup.mult{color:var(--crt-magenta)}
  .popup.bh{color:var(--gold)}
  @keyframes popupFloat{
    0%{transform:translateY(0);opacity:1}
    100%{transform:translateY(-60px);opacity:0}
  }

  /* Toast */
  .toast-layer{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:6px}
  .toast{padding:10px 16px;background:#0a160a;border:1px solid var(--crt-green);color:var(--crt-green);font-family:'Press Start 2P',monospace;font-size:10px;letter-spacing:1px;animation:toastIn .25s ease-out,toastOut .25s ease-in 2.2s forwards;box-shadow:0 0 12px var(--crt-green)}
  .toast.red{border-color:var(--crt-red);color:var(--crt-red);box-shadow:0 0 12px var(--crt-red)}
  .toast.gold{border-color:var(--gold);color:var(--gold);box-shadow:0 0 12px var(--gold)}
  @keyframes toastIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes toastOut{to{opacity:0;transform:translateY(-12px)}}

  /* Title screen */
  .splash{text-align:center;padding:40px 20px}
  .splash .big-logo{font-family:'Press Start 2P',monospace;font-size:56px;color:var(--crt-green);text-shadow:0 0 14px var(--crt-green),0 0 28px var(--crt-green);letter-spacing:6px;margin-bottom:6px}
  .splash .tag{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--crt-amber);text-shadow:0 0 6px var(--crt-amber);letter-spacing:2px;margin-bottom:30px}
  .splash .menu{display:flex;flex-direction:column;gap:10px;align-items:center;margin:30px 0}
  .splash .menu button{min-width:280px}
  .splash .info{max-width:560px;margin:30px auto 0;font-family:'VT323',monospace;font-size:17px;color:var(--crt-white);line-height:1.4;text-align:left;padding:14px;border:1px solid var(--border);background:#040904}
  .splash .info b{color:var(--crt-amber);text-shadow:0 0 3px var(--crt-amber);font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:1px;display:inline-block;margin-right:6px}

  /* Run over screen */
  .game-over .title{font-family:'Press Start 2P',monospace;font-size:32px;color:var(--crt-red);text-shadow:0 0 12px var(--crt-red);letter-spacing:4px;text-align:center;margin:20px 0}
  .game-over .victory .title{color:var(--gold);text-shadow:0 0 12px var(--gold)}

  /* Boss mutator banner */
  .mutator{padding:10px 14px;border:1px dashed var(--crt-purple);background:#150a1f;font-family:'VT323',monospace;font-size:16px;color:var(--crt-magenta);text-shadow:0 0 4px var(--crt-magenta);margin-bottom:12px}
  .mutator b{color:var(--crt-purple);font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:1px;margin-right:6px}

  /* ============================ TBS BOSS BLIND ============================ */
  .tbs-overlay{position:fixed;inset:0;background:rgba(0,8,4,0.95);z-index:1000;overflow-y:auto;font-family:'VT323',monospace;color:var(--crt-green);padding:20px}
  .tbs-overlay::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,140,0.04) 2px,rgba(0,255,140,0.04) 3px);pointer-events:none;z-index:1}
  .tbs-modal{position:relative;z-index:2;max-width:1200px;margin:0 auto;border:2px solid var(--crt-amber);background:#02110a;padding:18px;box-shadow:0 0 40px rgba(255,176,32,0.4)}
  .tbs-header{border-bottom:1px solid var(--crt-amber);padding-bottom:12px;margin-bottom:16px;display:flex;flex-wrap:wrap;justify-content:space-between;gap:10px;align-items:center}
  .tbs-header .tbs-title{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--crt-amber);text-shadow:0 0 6px var(--crt-amber);letter-spacing:2px}
  .tbs-header .tbs-meta{font-size:14px;color:var(--crt-cyan)}
  .tbs-header .tbs-tag{display:inline-block;background:var(--crt-purple);color:#fff;font-family:'Press Start 2P',monospace;font-size:8px;padding:3px 7px;letter-spacing:1px;margin-right:6px}

<body>

<div class="toast-layer" id="toast-layer"></div>

<script>
'use strict';

// =====================================================================
// ACED — Balatro-style CPA roguelike
// =====================================================================

const SUITS = {
  FAR: { name:'FAR', symbol:'$$', color:'var(--crt-green)' },
  AUD: { name:'AUD', symbol:'??', color:'var(--crt-cyan)' },
  REG: { name:'REG', symbol:'§§', color:'var(--crt-amber)' },
  BAR: { name:'BAR', symbol:'∆∆', color:'var(--crt-magenta)' },
};

// Rank symbols by tier (1-8) — tier maps to rarity/power
const TIER_RANKS = {
  1:'T1', 2:'T2', 3:'T3', 4:'T4', 5:'T5', 6:'T6', 7:'T7', 8:'T8'
};
// Chips (knowledge) base per tier
const TIER_CHIPS = { 1:10, 2:15, 3:25, 4:40, 5:60, 6:85, 7:120, 8:200 };
// Mult base per tier
const TIER_MULT  = { 1:1, 2:1, 3:2, 4:2, 5:3, 6:4, 7:5, 8:8 };

// =====================================================================
// CARD CONSTRUCTION
// Each question becomes a Card with: id, suit, tier, topic, chips, mult, q (full obj)
// =====================================================================
function buildCardPool(){
  const pool = [];
  let id = 0;
  for(const tierKey of Object.keys(window.QUESTIONS)){
    const tier = parseInt(tierKey, 10);
    const qs = window.QUESTIONS[tierKey].questions || [];
    for(const q of qs){
      pool.push({
        id: 'c'+(id++),
        suit: 'FAR',                 // only FAR for now; later AUD/REG/BAR get their own banks
        tier,
        topic: q.topic,
        topicShort: shortTopic(q.topic),
        topicCategory: categorize(q.topic),
        chips: TIER_CHIPS[tier],
        mult: TIER_MULT[tier],
        q,                            // {topic,q,choices,answer,explain}
      });
    }
  }
  return pool;
}
function shortTopic(t){
  // Strip parenthetical clarifiers for display, keep ≤ 22 chars
  const base = t.replace(/\s*\(.*?\)/g,'').trim();
  return base.length > 22 ? base.slice(0,20)+'..' : base;
}
function categorize(t){
  // Coarse buckets used for combo detection (Pair = same category)
  const s = t.toLowerCase();
  if(s.startsWith('asc 606')||s.includes('revenue')) return 'REVENUE';
  if(s.includes('lease')) return 'LEASES';
  if(s.includes('income tax')||s.includes('tax')) return 'TAX';
  if(s.includes('consolidat')||s.includes('business combination')) return 'CONSOLIDATIONS';
  if(s.includes('pension')) return 'PENSIONS';
  if(s.includes('derivative')||s.includes('hedge')) return 'DERIVATIVES';
  if(s.includes('eps')||s.includes('stock')) return 'EPS_EQUITY';
  if(s.includes('cash flow')) return 'CASH_FLOWS';
  if(s.includes('gasb')||s.includes('govern')) return 'GOVT';
  if(s.includes('nfp')||s.includes('not-for-profit')||s.includes('non-profit')) return 'NFP';
  if(s.includes('bond')) return 'BONDS';
  if(s.includes('fx')||s.includes('foreign')) return 'FX';
  if(s.includes('inventory')) return 'INVENTORY';
  if(s.includes('fixed asset')||s.includes('ppe')||s.includes('depreciation')) return 'FIXED_ASSETS';
  if(s.includes('intangible')||s.includes('goodwill')) return 'INTANGIBLES';
  if(s.includes('investment')||s.includes('equity method')||s.includes('available-for-sale')) return 'INVESTMENTS';
  if(s.includes('conceptual')) return 'CONCEPTUAL';
  if(s.includes('cash')||s.includes('receivable')) return 'CASH_AR';
  return 'OTHER';
}

// =====================================================================
// COMBOS — Balatro-style hand evaluation
// =====================================================================
const COMBOS = {
  HIGH:           { name:'HIGH STAKES',    chips:5,    mult:1,  desc:'A single card. Base value.' },
  PAIR:           { name:'PAIR',           chips:10,   mult:2,  desc:'2 cards same TOPIC AREA.' },
  TWO_PAIR:       { name:'TWO PAIR',       chips:20,   mult:2,  desc:'Two different pairs.' },
  THREE:          { name:'THREE OF A KIND',chips:30,   mult:3,  desc:'3 cards same TOPIC AREA.' },
  STRAIGHT:       { name:'STRAIGHT',       chips:30,   mult:4,  desc:'5 cards in tier order (e.g. T1-T2-T3-T4-T5).' },
  FLUSH:          { name:'FLUSH',          chips:35,   mult:4,  desc:'5 cards same SECTION.' },
  FULL_HOUSE:     { name:'FULL HOUSE',     chips:40,   mult:4,  desc:'3 same topic + 2 same topic.' },
  FOUR:           { name:'FOUR OF A KIND', chips:60,   mult:7,  desc:'4 cards same TOPIC AREA.' },
  STRAIGHT_FLUSH: { name:'STRAIGHT FLUSH', chips:100,  mult:8,  desc:'Straight + Flush.' },
  FIVE:           { name:'FIVE OF A KIND', chips:120,  mult:12, desc:'5 cards same TOPIC AREA.' },
};

function evalHand(cards){
  if(!cards.length) return { type:'HIGH', cards:[], ...COMBOS.HIGH };
  const sorted = [...cards].sort((a,b)=>a.tier-b.tier);
  const tiers = sorted.map(c=>c.tier);
  const cats = sorted.map(c=>c.topicCategory);
  const suits = sorted.map(c=>c.suit);

  // count occurrences by category
  const catCount = {};
  for(const c of cats) catCount[c]=(catCount[c]||0)+1;
  const counts = Object.values(catCount).sort((a,b)=>b-a);
  const maxCount = counts[0]||1;

  // flush (5+ same suit)
  const suitCount = {};
  for(const s of suits) suitCount[s]=(suitCount[s]||0)+1;
  const isFlush = Object.values(suitCount).some(c=>c>=5) && cards.length>=5;

  // straight (5 cards with consecutive tier values)
  let isStraight = false;
  if(cards.length>=5){
    const uniq = [...new Set(tiers)].sort((a,b)=>a-b);
    if(uniq.length>=5){
      for(let i=0;i<=uniq.length-5;i++){
        if(uniq[i+4]-uniq[i]===4){ isStraight = true; break; }
      }
    }
  }

  let type='HIGH', scoringCards=sorted.slice(0,1);
  // pick best combo
  if(maxCount>=5){
    type='FIVE';
    scoringCards = sorted.filter(c=>catCount[c.topicCategory]>=5).slice(0,5);
  } else if(isStraight && isFlush){
    type='STRAIGHT_FLUSH';
    scoringCards = sorted.slice(0,5);
  } else if(maxCount===4){
    type='FOUR';
    scoringCards = sorted.filter(c=>catCount[c.topicCategory]>=4).slice(0,4);
  } else if(maxCount===3 && counts[1]>=2){
    type='FULL_HOUSE';
    scoringCards = sorted;
  } else if(isFlush){
    type='FLUSH';
    scoringCards = sorted.slice(0,5);
  } else if(isStraight){
    type='STRAIGHT';
    scoringCards = sorted.slice(0,5);
  } else if(maxCount===3){
    type='THREE';
    scoringCards = sorted.filter(c=>catCount[c.topicCategory]>=3);
  } else if(counts[0]===2 && counts[1]===2){
    type='TWO_PAIR';
    scoringCards = sorted.filter(c=>catCount[c.topicCategory]===2);
  } else if(maxCount===2){
    type='PAIR';
    scoringCards = sorted.filter(c=>catCount[c.topicCategory]===2);
  } else {
    type='HIGH';
    // High Stakes: the single highest-tier card is the "kicker"
    scoringCards = [sorted[sorted.length-1]];
  }

  return {
    type,
    name: COMBOS[type].name,
    cards: scoringCards,
    chips: COMBOS[type].chips,
    mult: COMBOS[type].mult,
    allCards: sorted,
  };
}

// =====================================================================
// ADVISORS — the "jokers"
// Each: {key, name, rarity, desc, hook:(ctx)=>void}
// Hooks: onScoreCard(ctx,card), onHandStart(ctx), onCardCorrect(ctx,card), onCardWrong(ctx,card), onHandEnd(ctx), onBlindStart(ctx), onBlindEnd(ctx)
// =====================================================================
const ADVISORS = {
  BIG_4_PARTNER: {
    key:'BIG_4_PARTNER', name:'BIG 4 PARTNER', rarity:'common', cost:4,
    desc:'+30 Knowledge on the FIRST card scored each hand.',
    hooks:{ onScoreCard(ctx,card,idx){ if(idx===0){ ctx.chips+=30; ctx.popups.push({type:'chips',text:'+30',from:'BIG 4 PARTNER'}); } } }
  },
  BECKER_TUTOR: {
    key:'BECKER_TUTOR', name:'BECKER TUTOR', rarity:'common', cost:5,
    desc:'+1.5x Confidence if the played hand is a FLUSH.',
    hooks:{ onHandEnd(ctx){ if(ctx.handType==='FLUSH'||ctx.handType==='STRAIGHT_FLUSH'){ ctx.mult=Math.round(ctx.mult*1.5); ctx.popups.push({type:'mult',text:'x1.5',from:'BECKER TUTOR'}); } } }
  },
  REVENUE_RECOGNIZER: {
    key:'REVENUE_RECOGNIZER', name:'REV. RECOGNIZER', rarity:'common', cost:4,
    desc:'+25 Knowledge per REVENUE card scored.',
    hooks:{ onScoreCard(ctx,card){ if(card.topicCategory==='REVENUE'){ ctx.chips+=25; ctx.popups.push({type:'chips',text:'+25',from:'REV. RECOGNIZER'}); } } }
  },
  LEASE_WHISPERER: {
    key:'LEASE_WHISPERER', name:'LEASE WHISPERER', rarity:'common', cost:4,
    desc:'+4 Confidence per LEASES card scored.',
    hooks:{ onScoreCard(ctx,card){ if(card.topicCategory==='LEASES'){ ctx.mult+=4; ctx.popups.push({type:'mult',text:'+4',from:'LEASE WHISPERER'}); } } }
  },
  CONSOLIDATOR: {
    key:'CONSOLIDATOR', name:'THE CONSOLIDATOR', rarity:'uncommon', cost:6,
    desc:'CONSOLIDATIONS cards score TWICE.',
    hooks:{ onScoreCard(ctx,card){ if(card.topicCategory==='CONSOLIDATIONS' && !card._consolDoubled){ ctx.chips+=card.chips; ctx.mult+=card.mult; card._consolDoubled=true; ctx.popups.push({type:'chips',text:'RETRIGGER',from:'THE CONSOLIDATOR'}); } } }
  },
  DEFERRED_GENIUS: {
    key:'DEFERRED_GENIUS', name:'DEFERRED GENIUS', rarity:'uncommon', cost:6,
    desc:'+8 Confidence per TAX card scored.',
    hooks:{ onScoreCard(ctx,card){ if(card.topicCategory==='TAX'){ ctx.mult+=8; ctx.popups.push({type:'mult',text:'+8',from:'DEFERRED GENIUS'}); } } }
  },
  CAFFEINE_ADDICT: {
    key:'CAFFEINE_ADDICT', name:'CAFFEINE ADDICT', rarity:'uncommon', cost:5, cursed:true,
    desc:'x2 Confidence on every hand. -1 strike when you miss (instead of -3 effective).',
    hooks:{ onHandEnd(ctx){ ctx.mult*=2; ctx.popups.push({type:'mult',text:'x2',from:'CAFFEINE ADDICT'}); } }
  },
  ALL_NIGHTER: {
    key:'ALL_NIGHTER', name:'ALL-NIGHTER', rarity:'uncommon', cost:5, cursed:true,
    desc:'+50 Knowledge per card. -10 max hand size after blind.',
    hooks:{ onScoreCard(ctx,card){ ctx.chips+=50; ctx.popups.push({type:'chips',text:'+50',from:'ALL-NIGHTER'}); } }
  },
  SHARP_ANALYST: {
    key:'SHARP_ANALYST', name:'SHARP ANALYST', rarity:'common', cost:5,
    desc:'+15 Knowledge for each card scored in your hand.',
    hooks:{ onScoreCard(ctx,card){ ctx.chips+=15; } }
  },
  THE_AUDITOR: {
    key:'THE_AUDITOR', name:'THE AUDITOR', rarity:'common', cost:4,
    desc:'+1 Confidence per card scored. Stacks.',
    hooks:{ onScoreCard(ctx,card){ ctx.mult+=1; } }
  },
  CPA_REVIEW: {
    key:'CPA_REVIEW', name:'CPA REVIEW', rarity:'common', cost:4,
    desc:'+20 Knowledge if hand contains a PAIR or better.',
    hooks:{ onHandEnd(ctx){ if(['PAIR','TWO_PAIR','THREE','FULL_HOUSE','FOUR','FIVE'].includes(ctx.handType)){ ctx.chips+=20; ctx.popups.push({type:'chips',text:'+20',from:'CPA REVIEW'}); } } }
  },
  BOSS_KILLER: {
    key:'BOSS_KILLER', name:'BOSS KILLER', rarity:'rare', cost:8,
    desc:'x3 final score on BOSS BLINDS only.',
    hooks:{ onHandEnd(ctx){ if(ctx.blindType==='boss'){ ctx.mult=Math.round(ctx.mult*3); ctx.popups.push({type:'mult',text:'x3 BOSS',from:'BOSS KILLER'}); } } }
  },
  SECOND_CHANCE: {
    key:'SECOND_CHANCE', name:'SECOND CHANCE', rarity:'rare', cost:7,
    desc:'First wrong answer each blind does not cost a strike.',
    hooks:{}
  },
  PRESTIGE: {
    key:'PRESTIGE', name:'PRESTIGE', rarity:'rare', cost:10,
    desc:'+100 Knowledge × number of Advisors you own.',
    hooks:{ onHandEnd(ctx){ const bonus = 100*(ctx.advisors.length); ctx.chips+=bonus; ctx.popups.push({type:'chips',text:'+'+bonus,from:'PRESTIGE'}); } }
  },
  PERFECTIONIST: {
    key:'PERFECTIONIST', name:'PERFECTIONIST', rarity:'rare', cost:9,
    desc:'If you go a full hand with no wrong answers, x4 Confidence.',
    hooks:{ onHandEnd(ctx){ if(ctx.handMisses===0){ ctx.mult*=4; ctx.popups.push({type:'mult',text:'x4 PERFECT',from:'PERFECTIONIST'}); } } }
  },
};

// =====================================================================
// BLINDS & ANTES
// =====================================================================
// Ante = current stage. Each Ante: small blind, big blind, boss blind.
// Score targets scale roughly 2x per blind, 1.6x per ante.
const ANTE_BASE = { small: 300, big: 450, boss: 600 };
function scoreTarget(ante, blindType){
  const scaling = Math.pow(1.6, ante-1);
  return Math.round(ANTE_BASE[blindType] * scaling / 10) * 10;
}

const BOSS_MUTATORS = [
  { key:'PCAOB', name:'PCAOB INSPECTION', desc:'All cards are one tier harder to score. Chips are halved on T1-T2 cards.', apply:(card,ctx)=>{ if(card.tier<=2) card.chips = Math.floor(card.chips/2); } },
  { key:'YEAR_END', name:'YEAR-END CLOSE',  desc:'-2 max hand size this blind.',           preBlind:(state)=>{ state.handSize = Math.max(3, state.handSize-2); } },
  { key:'BIG4_REVIEW', name:'BIG 4 REVIEW', desc:'No partial credit — must hit target with one hand or lose.', oneShot:true },
  { key:'SEC_ENF', name:'SEC ENFORCEMENT',  desc:'First wrong answer ends the blind.',     instantStrike:true },
  { key:'BUSY_SEASON', name:'BUSY SEASON',  desc:'Timer per question -50%.',               timerMult:0.5 },
  { key:'PEER_REVIEW', name:'PEER REVIEW',  desc:'Combos do not multiply — flat scoring.', noCombos:true },
];

// Career ranks - meta progression aspiration
const RANKS = [
  { key:'INTERN',     min:0,     name:'INTERN' },
  { key:'JR_ASSOC',   min:500,   name:'JR ASSOC' },
  { key:'ASSOCIATE',  min:1500,  name:'ASSOCIATE' },
  { key:'SR_ASSOC',   min:3500,  name:'SR ASSOC' },
  { key:'MANAGER',    min:7000,  name:'MANAGER' },
  { key:'SR_MGR',     min:13000, name:'SR MGR' },
  { key:'DIRECTOR',   min:22000, name:'DIRECTOR' },
  { key:'PARTNER',    min:35000, name:'PARTNER' },
  { key:'EQUITY',     min:60000, name:'EQUITY PARTNER' },
];
function rankFor(bh){
  let r = RANKS[0];
  for(const x of RANKS){ if(bh>=x.min) r=x; }
  return r;
}

// =====================================================================
// STATE (session-only — sandbox blocks localStorage)
// =====================================================================
const state = {
  view:'splash',          // splash | run | shop | gameover | victory
  bh:0,                   // billable hours (meta currency, session-only)
  lifetimeBH:0,           // lifetime BH for rank
  runsPlayed:0,
  bestAnte:0,
  cardPool:[],            // all FAR cards available
  // run state
  run:null,
  // ui state
  selectedCardIds:new Set(),
  activeQuestion:null,    // {card, choiceIdx?, correct?}
  pendingScoreQueue:[],   // sequential card scoring queue
};

function freshRun(){
  state.cardPool = buildCardPool();
  shuffle(state.cardPool);
  return {
    ante:1,
    blindIdx:0,             // 0=small,1=big,2=boss
    blindType:'small',
    bossMutator:null,
    bossTbs:null,
    tbsCompleted:false,
    usedTbsIds:[],
    target: scoreTarget(1,'small'),
    accumScore:0,           // accumulated score this blind from prior hands
    handsLeft:4,
    discardsLeft:3,
    handSize:8,
    strikes:0,
    maxStrikes:3,
    deck:[...state.cardPool],   // remaining drawable cards
    hand:[],                    // currently in hand
    discardPile:[],
    advisors:[],
    moneyEarnedThisBlind:0,
    // current hand resolution context
    handMisses:0,
  };
}
function startNewRun(){
  state.run = freshRun();
  drawToFullHand(state.run);
  state.view='run';
  if(window.ACEDJuice){
    window.ACEDJuice.streak.reset();
    window.ACEDJuice.unlock('first_run');
  }
  render();
}

// =====================================================================
// UTIL
// =====================================================================
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
function drawToFullHand(run){
  while(run.hand.length<run.handSize && run.deck.length){
    run.hand.push(run.deck.shift());
  }
}
function toast(text, kind){
  const layer = document.getElementById('toast-layer');
  const el = document.createElement('div');
  el.className = 'toast'+(kind?' '+kind:'');
  el.textContent = text;
  layer.appendChild(el);
  setTimeout(()=>el.remove(), 2700);
}
function popup(text, kind, x, y){
  const layer = document.getElementById('popup-layer');
  const el = document.createElement('div');
  el.className = 'popup '+(kind||'');
  el.textContent = text;
  el.style.left = (x||window.innerWidth/2)+'px';
  el.style.top  = (y||window.innerHeight/2)+'px';
  layer.appendChild(el);
  setTimeout(()=>el.remove(), 1300);
}

// =====================================================================
// PLAYING A HAND — the core dopamine loop
// =====================================================================
function playSelectedHand(){
  const run = state.run;
  if(run.handsLeft<=0){ toast('NO HANDS LEFT','red'); return; }
  const selectedCards = run.hand.filter(c=>state.selectedCardIds.has(c.id));
  if(!selectedCards.length){ toast('SELECT AT LEAST 1 CARD','red'); return; }
  if(selectedCards.length>5){ toast('MAX 5 CARDS','red'); return; }

  run.handsLeft--;
  const evalResult = evalHand(selectedCards);

  // Set up sequential scoring queue: each scoring card triggers a question
  state.pendingScoreQueue = {
    evalResult,
    selectedCards,
    scoringCards: evalResult.cards,
    cursor: 0,
    handMisses: 0,
    chipsAcc: evalResult.chips,
    multAcc: evalResult.mult,
    popupsPending: [],
  };
  // Apply onHandStart advisor hooks
  const ctx = makeAdvisorCtx(run, state.pendingScoreQueue);
  for(const a of run.advisors){
    if(a.hooks && a.hooks.onHandStart) a.hooks.onHandStart(ctx);
  }
  syncCtxBack(ctx, state.pendingScoreQueue);

  proceedScoringQueue();
}

function makeAdvisorCtx(run, q){
  return {
    run,
    advisors: run.advisors,
    chips: q.chipsAcc,
    mult: q.multAcc,
    handType: q.evalResult.type,
    blindType: run.blindType,
    handMisses: q.handMisses,
    popups: [],
  };
}
function syncCtxBack(ctx, q){
  q.chipsAcc = ctx.chips;
  q.multAcc = ctx.mult;
  q.popupsPending.push(...ctx.popups);
}

function proceedScoringQueue(){
  const q = state.pendingScoreQueue;
  if(!q) return;
  if(q.cursor>=q.scoringCards.length){
    finishHand();
    return;
  }
  const card = q.scoringCards[q.cursor];
  state.activeQuestion = { card, scoring:true };
  render();
}

function answerActiveQuestion(choiceIdx){
  const aq = state.activeQuestion;
  if(!aq || aq.locked) return;
  aq.choiceIdx = choiceIdx;
  aq.locked = true;
  aq.correct = (choiceIdx === aq.card.q.answer);
  render();
}

function continueAfterAnswer(){
  const aq = state.activeQuestion;
  const q = state.pendingScoreQueue;
  if(!aq || !q){ state.activeQuestion=null; render(); return; }
  const run = state.run;
  const card = aq.card;

  if(aq.correct){
    // === JUICE: correct answer ===
    if(window.ACEDJuice){
      window.ACEDJuice.sfx.correct();
      window.ACEDJuice.streak.onCorrect();
      window.ACEDJuice.flash('#22ff66', 120, 0.18);
      window.ACEDJuice.particles(window.innerWidth/2, window.innerHeight*0.45, {count:14, colors:['#22ff66','#ffd23f','#5cffea']});
      const _p = window.ACEDJuice.getProfile();
      _p.totalAnswered = (_p.totalAnswered||0)+1;
      _p.totalCorrect  = (_p.totalCorrect||0)+1;
      window.ACEDJuice.saveProfile(_p);
      window.ACEDJuice.addXP(10);
    }
    // === Campaign + Nemesis tracking on correct ===
    if(window.ACEDCampaign && card.q && card.q.source){
      const triggered = window.ACEDCampaign.recordCorrect(card.q.source);
      if(triggered){
        // Chapter cleared — fanfare
        if(window.ACEDJuice){
          window.ACEDJuice.sfx.bossDefeat && window.ACEDJuice.sfx.bossDefeat();
          window.ACEDJuice.flash('#ffd23f', 600, 0.4);
        }
        const unlock = triggered.unlocks.advisor?.name || triggered.unlocks.consumable?.name || triggered.unlocks.title?.name || 'codex fragment';
        toast('CHAPTER CLEARED — '+triggered.title+' · Unlocked: '+unlock,'gold');
      }
    }
    if(window.ACEDNemesis && card.q) window.ACEDNemesis.recordCorrect(card.q);
    // Card scores: add its chips and mult
    let cardChips = card.chips;
    let cardMult = card.mult;
    // Apply boss mutator card-level effects
    if(run.bossMutator && run.bossMutator.apply){
      const tempCard = { ...card };
      run.bossMutator.apply(tempCard);
      cardChips = tempCard.chips;
      cardMult = tempCard.mult;
    }
    // Apply confidence multiplier
    const _tierC = (window.ACEDConfidence && aq.confidenceTier) ? window.ACEDConfidence.TIERS[aq.confidenceTier] : null;
    if(_tierC && _tierC.mult !== 1.0){
      cardChips = Math.round(cardChips * _tierC.mult);
      cardMult  = Math.round(cardMult  * _tierC.mult);
    }
    // Drain confidence-debt from prior overconfident miss
    if(run._confidenceDebt && run._confidenceDebt > 0){
      const drain = Math.min(run._confidenceDebt, cardMult);
      cardMult -= drain;
      run._confidenceDebt -= drain;
      if(drain > 0){
        q.popupsPending.push({type:'mult',text:'-'+drain+' DEBT',from:'OVERCONF'});
      }
    }
    q.chipsAcc += cardChips;
    q.multAcc += cardMult;
    // Record calibration sample (correct)
    if(window.ACEDConfidence && aq.confidenceTier){
      window.ACEDConfidence.record(aq.confidenceTier, true, card.q);
    }
    // popups
    const _confTag = _tierC ? (' '+_tierC.emoji) : '';
    q.popupsPending.push({type:'chips',text:'+'+cardChips+_confTag,from:card.topicShort});
    q.popupsPending.push({type:'mult',text:'+'+cardMult+_confTag,from:card.topicShort});
    // Run advisor onScoreCard hooks
    const ctx = makeAdvisorCtx(run, q);
    for(const a of run.advisors){
      if(a.hooks && a.hooks.onScoreCard) a.hooks.onScoreCard(ctx, card, q.cursor);
    }
    syncCtxBack(ctx, q);
  } else {
    // Wrong answer — strike logic
    q.handMisses++;
    if(window.ACEDJuice){
      window.ACEDJuice.sfx.wrong();
      window.ACEDJuice.streak.onWrong();
      window.ACEDJuice.shake(8, 250);
      window.ACEDJuice.flash('#ff3838', 180, 0.25);
      const _pw = window.ACEDJuice.getProfile();
      _pw.totalAnswered = (_pw.totalAnswered||0)+1;
      window.ACEDJuice.saveProfile(_pw);
    }
    // === Witty Wrong + Nemesis tracking ===
    if(window.ACEDNemesis && card.q) window.ACEDNemesis.recordMiss(card.q);
    // Record calibration sample (wrong) + apply tier penalty
    const _tierW = (window.ACEDConfidence && aq.confidenceTier) ? window.ACEDConfidence.TIERS[aq.confidenceTier] : null;
    if(_tierW){
      window.ACEDConfidence.record(aq.confidenceTier, false, card.q);
      if(_tierW.id === 'MED'){
        // Calibration debt — drag next card's mult by 2
        run._confidenceDebt = (run._confidenceDebt||0) + 2;
        toast('💡 OVERCONFIDENT (75%) → −2 mult on next card','red');
      } else if(_tierW.id === 'HIGH'){
        // Double strike on a HIGH-confidence miss
        run._pendingExtraStrike = true;
        toast('💪 LOCKED IN BUT WRONG → DOUBLE STRIKE','red');
      }
    }
    if(window.ACEDWittyWrongs && card.q){
      const roast = window.ACEDWittyWrongs.getRoast(card.q);
      showWittyToast(roast.message, roast.tagged ? roast.patternLabel : null);
    }
    const hasSecondChance = run.advisors.some(a=>a.key==='SECOND_CHANCE') && !run._usedSecondChance;
    if(hasSecondChance){
      run._usedSecondChance = true;
      toast('SECOND CHANCE — no strike','gold');
    } else {
      // SEC enforcement boss = instant strike-out
      if(run.bossMutator && run.bossMutator.instantStrike){
        run.strikes = run.maxStrikes;
        toast('SEC ENFORCEMENT — RUN OVER','red');
      } else {
        run.strikes++;
        if(run._pendingExtraStrike){
          run.strikes++;
          run._pendingExtraStrike = false;
        }
        if(run.strikes > run.maxStrikes) run.strikes = run.maxStrikes;
        toast('STRIKE '+run.strikes+'/'+run.maxStrikes,'red');
        if(window.ACEDJuice){
          window.ACEDJuice.sfx.strike();
          window.ACEDJuice.shake(16, 400);
          window.ACEDJuice.flash('#ff3838', 240, 0.5);
        }
      }
    }
  }

  // Flush popups visually
  flushPopups(q.popupsPending);
  q.popupsPending = [];

  q.cursor++;
  state.activeQuestion = null;

  // Run over by strikes?
  if(run.strikes>=run.maxStrikes){
    endRun(false);
    return;
  }
  // Continue
  setTimeout(()=>proceedScoringQueue(), 300);
}

function flushPopups(arr){
  const w = window.innerWidth, h = window.innerHeight;
  for(let i=0;i<arr.length;i++){
    const p = arr[i];
    const x = w/2 + (Math.random()*180-90);
    const y = h*0.35 + (i*22);
    popup(p.text, p.type, x, y);
  }
}

function finishHand(){
  const q = state.pendingScoreQueue;
  const run = state.run;
  if(!q) return;
  // onHandEnd hooks (after all cards scored)
  const ctx = makeAdvisorCtx(run, q);
  for(const a of run.advisors){
    if(a.hooks && a.hooks.onHandEnd) a.hooks.onHandEnd(ctx);
  }
  syncCtxBack(ctx, q);
  flushPopups(q.popupsPending);

  // Boss "no combos" mutator?
  let finalChips = q.chipsAcc;
  let finalMult = q.multAcc;
  if(run.bossMutator && run.bossMutator.noCombos){
    // Strip out combo base chips/mult; only card values count
    finalChips = q.chipsAcc - q.evalResult.chips;
    finalMult = Math.max(1, q.multAcc - q.evalResult.mult);
  }
  // === JUICE: streak meta-multiplier ===
  if(window.ACEDJuice && window.ACEDJuice.streak.tier()>0){
    finalMult = Math.round(finalMult * window.ACEDJuice.streak.multiplier());
  }
  const handScore = finalChips * finalMult;
  run.accumScore += handScore;
  // === JUICE: hand-end fanfare ===
  if(window.ACEDJuice){
    const isCrit = handScore >= run.target;
    if(isCrit){
      window.ACEDJuice.sfx.crit();
      window.ACEDJuice.critPop('CRIT! '+handScore, window.innerWidth/2, window.innerHeight*0.4, '#ffd23f');
      window.ACEDJuice.particles(window.innerWidth/2, window.innerHeight*0.4, {count:50});
      window.ACEDJuice.shake(10, 400);
      window.ACEDJuice.flash('#ffd23f', 240, 0.35);
    } else {
      window.ACEDJuice.sfx.handPlay();
      window.ACEDJuice.critPop('+'+handScore, window.innerWidth/2, window.innerHeight*0.4, '#ffd23f');
      window.ACEDJuice.shake(4, 200);
    }
    const ht = q.evalResult.type;
    if(ht==='FLUSH'||ht==='STRAIGHT_FLUSH') window.ACEDJuice.unlock('flush');
    if(ht==='FULL_HOUSE') window.ACEDJuice.unlock('fullhouse');
    if(ht==='FOUR') window.ACEDJuice.unlock('four');
    if(ht==='FIVE') window.ACEDJuice.unlock('five');
  }

  // Boss "one shot" — must beat target with single hand
  if(run.bossMutator && run.bossMutator.oneShot){
    if(handScore < run.target){
      toast('NO PARTIAL CREDIT — BUSTED','red');
      endRun(false);
      return;
    }
  }

  // Discard played + scoring cards (whether scored or not)
  const playedIds = new Set(q.selectedCards.map(c=>c.id));
  run.hand = run.hand.filter(c=>!playedIds.has(c.id));
  run.discardPile.push(...q.selectedCards);
  state.selectedCardIds = new Set();
  state.pendingScoreQueue = null;

  toast(q.evalResult.name+': '+finalChips+' × '+finalMult+' = '+handScore, 'gold');

  // Did we beat target?
  if(run.accumScore >= run.target){
    advanceBlind();
    return;
  }
  // Out of hands?
  if(run.handsLeft<=0){
    endRun(false);
    return;
  }
  // Draw back to hand size and continue
  drawToFullHand(run);
  render();
}

function discardSelected(){
  const run = state.run;
  if(run.discardsLeft<=0){ toast('NO DISCARDS LEFT','red'); return; }
  const ids = state.selectedCardIds;
  if(!ids.size){ toast('SELECT CARDS TO SKIP','red'); return; }
  run.discardsLeft--;
  const discarded = run.hand.filter(c=>ids.has(c.id));
  run.hand = run.hand.filter(c=>!ids.has(c.id));
  run.discardPile.push(...discarded);
  state.selectedCardIds = new Set();
  drawToFullHand(run);
  render();
}

// BLIND PROGRESSION
// =====================================================================
function advanceBlind(){
  const run = state.run;
  // Reward
  const reward = blindReward(run.blindType) + Math.max(0, run.handsLeft); // unused hands = $
  run.moneyEarnedThisBlind = reward;
  state.bh += reward;
  state.lifetimeBH += reward;
  toast('BLIND CLEARED · +'+reward+' hrs','gold');
  if(window.ACEDJuice){
    const isBoss = run.blindType==='boss';
    if(isBoss){
      window.ACEDJuice.sfx.bossDefeat();
      window.ACEDJuice.critPop('BOSS DEFEATED', window.innerWidth/2, window.innerHeight*0.35, '#a855f7');
      window.ACEDJuice.particles(window.innerWidth/2, window.innerHeight*0.4, {count:80});
      window.ACEDJuice.shake(18, 600);
      window.ACEDJuice.flash('#a855f7', 350, 0.45);
      window.ACEDJuice.unlock('first_boss');
      window.ACEDJuice.addXP(50);
    } else {
      window.ACEDJuice.sfx.cashIn();
      window.ACEDJuice.critPop('BLIND CLEARED', window.innerWidth/2, window.innerHeight*0.35, '#22ff66');
      window.ACEDJuice.particles(window.innerWidth/2, window.innerHeight*0.4, {count:40, colors:['#22ff66','#ffd23f']});
      window.ACEDJuice.shake(8, 350);
      window.ACEDJuice.flash('#22ff66', 220, 0.3);
      window.ACEDJuice.addXP(20);
    }
    window.ACEDJuice.unlock('first_blind');
    if(run.handMisses===0) window.ACEDJuice.unlock('no_miss_blind');
  }

  // Next blind
  run.blindIdx++;
  if(run.blindIdx>2){
    // Ante complete
    run.ante++;
    run.blindIdx=0;
    // Soft-paywall hook (disabled by default — flip ACED_PACK.PAYWALL.enabled to true)
    if(window.ACED_PACK && window.ACED_PACK.shouldShowSoftUpsell(run.ante)){
      try { showSoftUpsell(run.ante); } catch(e){}
    }
    if(window.ACED_PACK && window.ACED_PACK.isAnteLocked(run.ante)){
      toast('Demo ends at Ante '+run.ante+' — unlock full pack to continue','gold');
      state.view='victory'; render(); return;
    }
    if(run.ante>8){
      endRun(true);
      return;
    }
  }
  // Set up next blind state
  run.blindType = ['small','big','boss'][run.blindIdx];
  run.target = scoreTarget(run.ante, run.blindType);
  run.accumScore = 0;
  run.handsLeft = 4;
  run.discardsLeft = 3;
  run.handMisses = 0;
  run._usedSecondChance = false;
  run.handSize = 8;
  // TBS bosses on even antes (2,4,6,8) — special boss blind that opens a TBS modal.
  // Other bosses get a random mutator from BOSS_MUTATORS.
  run.bossMutator = null;
  run.bossTbs = null;
  if(run.blindType === 'boss'){
    const tbsAntes = [2,4,6,8];
    if(tbsAntes.includes(run.ante) && window.TBS_LIBRARY && window.TBS_LIBRARY.length){
      // Pick a TBS that hasn't been used yet this run
      const used = new Set(run.usedTbsIds || []);
      const pool = window.TBS_LIBRARY.filter(t => !used.has(t.id));
      const pick = (pool.length ? pool : window.TBS_LIBRARY)[Math.floor(Math.random() * (pool.length ? pool.length : window.TBS_LIBRARY.length))];
      run.bossTbs = pick;
      run.usedTbsIds = run.usedTbsIds || [];
      run.usedTbsIds.push(pick.id);
      run.tbsCompleted = false;
    } else {
      run.bossMutator = pickBoss();
      if(run.bossMutator && run.bossMutator.preBlind){
        run.bossMutator.preBlind(run);
      }
    }
  }
  // Reshuffle discard back into deck
  run.deck = [...run.deck, ...run.discardPile, ...run.hand];
  run.discardPile=[]; run.hand=[];
  shuffle(run.deck);
  drawToFullHand(run);

  // Open shop between blinds (after small & big, not after boss into next ante actually go to shop too)
  state.view='shop';
  setupShop();
  render();
}
function blindReward(t){ return { small:5, big:8, boss:12 }[t] || 5; }
function pickBoss(){ return BOSS_MUTATORS[Math.floor(Math.random()*BOSS_MUTATORS.length)]; }

// =====================================================================
// SHOP
// =====================================================================
let shopState = null;
function setupShop(){
  const allKeys = Object.keys(ADVISORS);
  const offer = shuffle([...allKeys]).slice(0,4).map(k=>({...ADVISORS[k], sold:false}));
  shopState = { offer, rerollCost: 2 };
}
function buyAdvisor(idx){
  const item = shopState.offer[idx];
  if(item.sold) return;
  if(state.bh < item.cost){ toast('NOT ENOUGH BH','red'); return; }
  if(state.run.advisors.length>=5){ toast('MAX 5 ADVISORS — SELL ONE','red'); return; }
  state.bh -= item.cost;
  state.run.advisors.push({ ...item });
  item.sold = true;
  toast('HIRED: '+item.name,'gold');
  if(window.ACEDJuice){
    window.ACEDJuice.sfx.advisorBuy();
    window.ACEDJuice.particles(window.innerWidth/2, window.innerHeight*0.5, {count:20, colors:['#ffd23f','#5cffea']});
    if(item.rarity==='rare') window.ACEDJuice.unlock('rare_advisor');
  }
  render();
}
function sellAdvisor(idx){
  const a = state.run.advisors[idx];
  if(!a) return;
  const refund = Math.max(1, Math.floor((a.cost||3)/2));
  state.bh += refund;
  state.run.advisors.splice(idx,1);
  toast('SOLD: '+a.name+' · +'+refund+' hrs','gold');
  render();
}
function reroll(){
  if(state.bh < shopState.rerollCost){ toast('NOT ENOUGH BH','red'); return; }
  state.bh -= shopState.rerollCost;
  shopState.rerollCost += 1;
  const allKeys = Object.keys(ADVISORS);
  shopState.offer = shuffle([...allKeys]).slice(0,4).map(k=>({...ADVISORS[k], sold:false}));
  render();
}
function leaveShop(){
  state.view='run';
  render();
}

// =====================================================================
// END OF RUN
// =====================================================================
function endRun(victory){
  const run = state.run;
  state.runsPlayed++;
  if(run.ante > state.bestAnte) state.bestAnte = run.ante;
  state.view = victory ? 'victory' : 'gameover';
  state.activeQuestion = null;
  state.pendingScoreQueue = null;
  // Record run for leaderboard
  if(window.ACEDSocial){
    const streak = window.ACEDJuice ? (window.ACEDJuice.streak.best||0) : 0;
    window.ACEDSocial.recordRun({score: run.accumScore||0, section:'FAR', ante: run.ante, streak, bossesDefeated: run.bossesDefeated||0});
  }
  if(window.ACEDJuice){
    const prof = window.ACEDJuice.getProfile();
    prof.runs = (prof.runs||0)+1;
    if(victory) prof.wins = (prof.wins||0)+1;
    window.ACEDJuice.saveProfile(prof);
    if(victory){
      window.ACEDJuice.sfx.cashIn();
      window.ACEDJuice.particles(window.innerWidth/2, window.innerHeight*0.4, {count:120});
      window.ACEDJuice.flash('#ffd23f', 500, 0.4);
      window.ACEDJuice.unlock('win');
      window.ACEDJuice.addXP(500);
      if(run.strikes >= run.maxStrikes-1) window.ACEDJuice.unlock('survivor');
    } else {
      window.ACEDJuice.sfx.runOver();
      window.ACEDJuice.shake(20, 800);
      window.ACEDJuice.flash('#ff3838', 500, 0.4);
    }
    if(run.ante>=3) window.ACEDJuice.unlock('ante_3');
    if(run.ante>=5) window.ACEDJuice.unlock('ante_5');
    if(run.ante>=8) window.ACEDJuice.unlock('ante_8');
    if(run.advisors && run.advisors.length>=6) window.ACEDJuice.unlock('six_advisors');
    window.ACEDJuice.streak.reset();
  }
  render();
}
function startAgain(){
  state.run = null;
  state.view='splash';
  render();
}

      </div>

      <h3>HAND ${sel.length}/5 SELECTED${sel.length ? ' · ' + ev.name : ''}</h3>
      <div class="score-box">
        <div class="score-side k">
          <div class="lbl">KNOWLEDGE</div>
          <div class="val">${previewChips}</div>
        </div>
        <div class="score-times">×</div>
        <div class="score-side c">
          <div class="lbl">CONFIDENCE</div>
          <div class="val">${previewMult}</div>
        </div>

    ${state.activeQuestion ? questionModalHTML() : ''}

  }
  for(const sellEl of document.querySelectorAll('[data-sell]')){
    sellEl.onclick = (e)=>{ e.stopPropagation(); sellAdvisor(parseInt(sellEl.dataset.sell,10)); };
  }
  document.getElementById('btn-play').onclick = playSelectedHand;
  document.getElementById('btn-discard').onclick = discardSelected;
  document.getElementById('btn-quit').onclick = ()=>{ if(confirm('Quit this run?')) startAgain(); };
  const muteBtn = document.getElementById('btn-mute');
  if(muteBtn) muteBtn.onclick = ()=>{ if(window.ACEDJuice){ window.ACEDJuice.setMuted(!window.ACEDJuice.isMuted()); render(); } };
  const btnTbs = document.getElementById('btn-launch-tbs');
  if(btnTbs){
    btnTbs.onclick = ()=>{
      window.openTBS(r.bossTbs, (result)=>{
        // Award chips to accumScore
        r.accumScore += result.awarded;
        r.tbsCompleted = true;
        if(result.cellsCorrect === result.totalCells){
          toast('PERFECT TBS · +'+result.awarded+' CHIPS','gold');
        } else if(result.cellsCorrect > 0){
          toast('TBS · '+result.cellsCorrect+'/'+result.totalCells+' → +'+result.awarded+' CHIPS','gold');

          toast('TBS submitted — review explanations','red');

        // If TBS alone clears the target, auto-advance
        if(r.accumScore >= r.target){
          setTimeout(()=>{ advanceBlind(); }, 800);
        } else {
          render();
        }
      });
    };
  }

  if(state.activeQuestion){
    wireQuestionModal();
  }
}

function cardHTML(c){
  const sel = state.selectedCardIds.has(c.id) ? ' selected' : '';
  // Show short preview of question (first 80 chars)
  const preview = (c.q.q||'').slice(0,90) + ((c.q.q||'').length>90?'...':'');
  return `
    <div class="card${sel}" data-card-id="${c.id}" data-suit="${c.suit}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="rank">${TIER_RANKS[c.tier]}</div>
        <div class="suit-icon">${SUITS[c.suit].symbol}</div>
      </div>
      <div class="topic">${c.topicShort}</div>
      <div class="question-preview">${preview}</div>
      <div class="footer">
        <div class="chips">+${c.chips}</div>
        <div class="mult">+${c.mult}</div>
      </div>
    </div>
  `;
}
function toggleCard(id){
  if(state.activeQuestion) return; // can't toggle during question
  if(state.selectedCardIds.has(id)){
    state.selectedCardIds.delete(id);
    if(window.ACEDJuice) window.ACEDJuice.sfx.deselect();
  } else {
    if(state.selectedCardIds.size>=5){ toast('MAX 5 CARDS','red'); return; }
    state.selectedCardIds.add(id);
    if(window.ACEDJuice) window.ACEDJuice.sfx.select();
  }
  render();
}

function questionModalHTML(){
  const aq = state.activeQuestion;
  const c = aq.card;
  const choices = c.q.choices || [];
  const tiers = window.ACEDConfidence ? window.ACEDConfidence.TIERS : null;
  const pickedTier = aq.confidenceTier ? (tiers && tiers[aq.confidenceTier]) : null;

  // Confidence reward/penalty math display when locked
  let confDisplay = '';
  if(aq.locked && pickedTier){
    const baseChips = c.chips, baseMult = c.mult;
    const effMult = pickedTier.mult;
    confDisplay = aq.correct
      ? ` · ${pickedTier.emoji} ${pickedTier.label} → ×${effMult}`
      : ` · ${pickedTier.emoji} ${pickedTier.label} → penalty applied`;
  }

  return `
    <div class="modal-backdrop">
      <div class="modal">
        <h2>${c.topic}</h2>
        <div class="qprompt">${escapeHTML(c.q.q)}</div>

        ${(!aq.locked && !aq.confidenceTier && tiers) ? `
          <div class="conf-picker">
            <div class="conf-label">⚡ HOW CONFIDENT ARE YOU? · LOCK BEFORE ANSWERING</div>
            <div class="conf-tiers">
              ${['LOW','MED','HIGH'].map(tid=>{
                const t = tiers[tid];
                return `
                  <div class="conf-tier tier-${tid}" data-conf="${tid}">
                    <span class="conf-emoji">${t.emoji}</span>
                    <span class="conf-pct">${t.label}</span>
                    <span class="conf-text">${t.text}</span>
                    <span class="conf-mult">×${t.mult} REWARD</span>
                    <span class="conf-risk">${t.riskNote}</span>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        ` : ''}

        ${aq.confidenceTier && tiers ? `
          <div class="conf-locked">
            <span class="conf-mini-emoji">${tiers[aq.confidenceTier].emoji}</span>
            LOCKED AT ${tiers[aq.confidenceTier].label} · ×${tiers[aq.confidenceTier].mult} MULTIPLIER ACTIVE
          </div>
        ` : ''}

        <div class="qchoices" style="${!aq.confidenceTier && !aq.locked ? 'opacity:0.35;pointer-events:none' : ''}">
          ${choices.map((ch,i)=>{
            let cls = '';
            if(aq.locked){
              if(i===c.q.answer) cls='right';
              else if(i===aq.choiceIdx) cls='wrong';
            }
            return `<div class="qchoice ${cls}" data-choice="${i}"><span class="letter">${String.fromCharCode(65+i)}</span><span>${escapeHTML(ch)}</span></div>`;
          }).join('')}
        </div>
        ${aq.locked ? `
          <div class="explain">
            <span class="verdict ${aq.correct?'good':'bad'}">${aq.correct?'CORRECT · +'+c.chips+' KNOW · +'+c.mult+' CONF':'WRONG'}${confDisplay}</span>
            ${escapeHTML(c.q.explain || '')}
          </div>
          <div class="action-row">
            <button class="big" id="btn-continue">CONTINUE</button>
          </div>
        ` : ''}
      </div>
    </div>
  `;
}
function wireQuestionModal(){
  const aq = state.activeQuestion;
  if(!aq.locked){
    // Hook confidence picker
    for(const el of document.querySelectorAll('[data-conf]')){
      el.onclick = ()=>{
        aq.confidenceTier = el.dataset.conf;
        if(window.ACEDJuice && window.ACEDJuice.sfx && window.ACEDJuice.sfx.select) window.ACEDJuice.sfx.select();
        render();
      };
    }
    // Only allow answer clicks once tier is picked
    if(aq.confidenceTier){
      for(const el of document.querySelectorAll('[data-choice]')){
        el.onclick = ()=>answerActiveQuestion(parseInt(el.dataset.choice,10));
      }
    }
  } else {
    document.getElementById('btn-continue').onclick = continueAfterAnswer;
  }
}
function escapeHTML(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

      <div style="font-family:'Press Start 2P',monospace;font-size:14px;color:var(--gold);text-shadow:0 0 8px var(--gold);letter-spacing:2px">${c.title}</div>
      <div style="font-family:'VT323',monospace;font-size:18px;color:var(--crt-white);margin:14px 0;line-height:1.4">${c.body}</div>
      <div style="border:1px solid var(--crt-amber);padding:10px;margin:10px 0;background:#1a1408">
        <div style="font-family:'Press Start 2P',monospace;font-size:9px;color:var(--crt-amber)">${c.ctaPrice}</div>
        <div style="font-family:'VT323',monospace;font-size:15px;color:var(--crt-grey);margin-top:4px">${c.ctaBundle}</div>
      </div>
      <div style="display:flex;gap:10px;margin-top:18px">
        <button id="aced-upsell-pay" style="flex:1;background:var(--gold);color:#000;border:none;font-family:'Press Start 2P',monospace;font-size:10px;padding:12px;letter-spacing:1px;cursor:pointer">UNLOCK FULL PACK</button>
        <button id="aced-upsell-skip" style="background:transparent;border:1px solid var(--crt-grey);color:var(--crt-grey);font-family:'Press Start 2P',monospace;font-size:9px;padding:12px;letter-spacing:1px;cursor:pointer">${c.ctaContinue}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#aced-upsell-pay').onclick = ()=>{
    if(cfg.paymentUrl){ window.open(cfg.paymentUrl,'_blank'); }
    else { toast('Coming soon — keep playing free','gold'); }
    overlay.remove();
  };
  overlay.querySelector('#aced-upsell-skip').onclick = ()=>overlay.remove();
}

// =====================================================================
// BOOT
// =====================================================================
render();
</script>
</body>
</html>
