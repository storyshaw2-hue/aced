<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>ACED — The Daily Close</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  /* ACED CRT identity — matched to study.html so the Daily feels native to the game. */
  :root{--bg:#0a0e07;--bg2:#0d1409;--panel:#0e1a0d;--panel2:#13230f;--green:#22ff66;--green-dim:#0fa84a;--amber:#ffb627;--red:#ff5238;--cyan:#5cffea;--magenta:#ff5cb8;--white:#d8f5d8;--grey:#5a7058;--border:#1a2e15;--gold:#ffd23f;--money:#9be36b;}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#000;color:var(--green);font-family:'VT323',ui-monospace,monospace;font-size:20px;line-height:1.25;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
  body{background:radial-gradient(ellipse at center,var(--bg2),#000),var(--bg);min-height:100vh;position:relative}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:200;background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0,rgba(0,0,0,.16) 1px,transparent 1px,transparent 3px)}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:199;background:radial-gradient(ellipse at center,transparent 58%,rgba(0,0,0,.6))}
  .wrap{max-width:640px;margin:0 auto;padding:14px 14px 60px;position:relative;z-index:1}

  .topbar{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:12px;gap:8px;flex-wrap:wrap}
  .logo{font-family:'Press Start 2P';font-size:15px;color:var(--green);text-shadow:0 0 8px var(--green);letter-spacing:1px}
  .logo .sub{font-size:7px;color:var(--amber);margin-left:6px}
  .tbtns{display:flex;gap:6px}
  .back,.tbtn{font-family:'Press Start 2P';font-size:8px;background:#0a160a;color:var(--grey);border:1px solid var(--border);padding:8px 10px;cursor:pointer;text-decoration:none}
  .back:hover,.tbtn:hover{color:var(--green);border-color:var(--green-dim)}

  /* streak ribbon */
  .ribbon{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px}
  .rstat{border:1px solid var(--border);background:#06100a;padding:8px 6px;text-align:center}
  .rstat .lbl{font-family:'Press Start 2P';font-size:7px;color:var(--grey);letter-spacing:1px;margin-bottom:5px}
  .rstat .val{font-family:'Press Start 2P';font-size:15px;color:var(--green);text-shadow:0 0 5px var(--green)}
  .rstat.streak .val{color:var(--amber);text-shadow:0 0 5px var(--amber)}
  .rstat.freeze .val{color:var(--cyan);text-shadow:0 0 5px var(--cyan)}
  .rstat .val small{font-family:'VT323';font-size:14px;color:var(--grey);text-shadow:none}

  .card-shell{border:2px solid var(--amber);background:linear-gradient(180deg,var(--panel),var(--panel2));padding:18px 16px;box-shadow:0 0 18px rgba(255,182,39,.12) inset}
  h1{font-family:'Press Start 2P';font-size:16px;color:var(--gold);text-shadow:0 0 10px var(--gold);margin:0 0 10px;line-height:1.4}
  h2{font-family:'Press Start 2P';font-size:13px;color:var(--gold);text-shadow:0 0 8px var(--gold);margin:0 0 8px}
  .closeno{font-family:'Press Start 2P';font-size:9px;color:var(--cyan);letter-spacing:1px;margin-bottom:14px}
  p{font-family:'VT323';font-size:18px;color:var(--white);line-height:1.3;margin:8px 0}
  p.muted{color:var(--grey)}
  p b{color:var(--cyan)} p em{color:var(--gold);font-style:normal}

  .btn{font-family:'Press Start 2P';font-size:11px;background:#0a160a;color:var(--green);border:1px solid var(--green-dim);padding:14px 18px;cursor:pointer;letter-spacing:1px;text-shadow:0 0 4px var(--green);width:100%;margin-top:14px}
  .btn:hover:not(:disabled){background:#0f2a14;border-color:var(--green);box-shadow:0 0 10px var(--green)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.gold{color:var(--gold);border-color:#7a5e0f;text-shadow:0 0 5px var(--gold)}
  .btn.gold:hover:not(:disabled){box-shadow:0 0 12px var(--gold);border-color:var(--gold)}
  .btn.cyan{color:var(--cyan);border-color:#1e5b58;text-shadow:0 0 4px var(--cyan)}
  .btn.cyan:hover:not(:disabled){box-shadow:0 0 10px var(--cyan);border-color:var(--cyan)}
  .btn.ghost{background:transparent;color:var(--grey);border-color:var(--border);text-shadow:none;font-size:9px;padding:11px}
  .btn.ghost:hover{color:var(--green);border-color:var(--green-dim);box-shadow:none}
  .btnrow{display:flex;gap:8px;margin-top:12px}
  .btnrow .btn{margin-top:0}

  /* progress pips during the run */
  .pips{display:flex;gap:6px;justify-content:center;margin-bottom:14px}
  .pip{width:24px;height:10px;border:1px solid var(--border);background:#040904}
  .pip.cur{border-color:var(--amber);box-shadow:0 0 6px var(--amber)}
  .pip.g{background:var(--green);box-shadow:0 0 6px var(--green);border-color:var(--green)}
  .pip.y{background:var(--amber);box-shadow:0 0 6px var(--amber);border-color:var(--amber)}
  .pip.r{background:var(--red);box-shadow:0 0 6px var(--red);border-color:var(--red)}
  .pip.k{background:#243018;border-color:#243018}

  .qmeta{display:flex;justify-content:space-between;align-items:center;font-family:'Press Start 2P';font-size:8px;color:var(--grey);letter-spacing:1px;margin-bottom:8px}
  .qmeta .mod{color:var(--cyan)} .qmeta .diff{color:var(--amber)}
  .qtext{font-family:'VT323';font-size:19px;color:var(--white);line-height:1.32;margin:6px 0 14px}
  .qchoices{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
  .qch{border:1px solid var(--green-dim);background:#0a160a;padding:11px 12px;cursor:pointer;font-family:'VT323';font-size:17px;color:var(--white);display:flex;gap:10px;align-items:flex-start;transition:border-color .12s,box-shadow .12s,background .12s}
  .qch:hover{border-color:var(--green);box-shadow:0 0 8px var(--green)}
  .qch:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .qch .ql{font-family:'Press Start 2P';font-size:9px;color:var(--gold);flex-shrink:0;margin-top:2px}
  .qch.sel{border-color:var(--amber);box-shadow:0 0 10px var(--amber);background:#161103}
  .qch.correct{border-color:var(--green);box-shadow:0 0 12px var(--green);background:#0a200f}
  .qch.wrong{border-color:var(--red);box-shadow:0 0 12px var(--red);background:#200a0a}
  .qch.locked{pointer-events:none;opacity:.85}

  .conf{margin:6px 0 4px}
  .conf .clab{font-family:'Press Start 2P';font-size:8px;color:var(--gold);letter-spacing:1px;margin-bottom:8px;text-align:center}
  .conftiers{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .ctier{border:2px solid var(--border);background:#0a1408;padding:11px 6px;cursor:pointer;text-align:center;transition:transform .12s,box-shadow .12s,background .12s}
  .ctier:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .ctier .cname{font-family:'Press Start 2P';font-size:10px;display:block;margin-bottom:5px}
  .ctier .cmult{font-family:'Press Start 2P';font-size:8px;color:var(--gold);display:block}
  .ctier .crisk{font-family:'VT323';font-size:13px;color:var(--grey);display:block;margin-top:4px;line-height:1.1}
  .ctier.LOW{border-color:#1e5b58}.ctier.LOW .cname{color:var(--cyan)}
  .ctier.MED{border-color:#7a5e0f}.ctier.MED .cname{color:var(--amber)}
  .ctier.HIGH{border-color:#7a1818}.ctier.HIGH .cname{color:var(--red)}
  .ctier:hover{transform:translateY(-2px)}
  .ctier.LOW:hover{box-shadow:0 0 10px var(--cyan)} .ctier.MED:hover{box-shadow:0 0 10px var(--amber)} .ctier.HIGH:hover{box-shadow:0 0 10px var(--red)}
  .ctier.picked.LOW{box-shadow:0 0 14px var(--cyan);background:#04140f}
  .ctier.picked.MED{box-shadow:0 0 14px var(--amber);background:#161103}
  .ctier.picked.HIGH{box-shadow:0 0 14px var(--red);background:#160808}

  .verdict{font-family:'Press Start 2P';font-size:12px;text-align:center;margin:4px 0 10px;letter-spacing:1px}
  .verdict.good{color:var(--money);text-shadow:0 0 8px var(--money)}
  .verdict.bad{color:var(--red);text-shadow:0 0 8px var(--red)}
  .verdict .pts{display:block;font-size:9px;color:var(--grey);margin-top:6px;text-shadow:none}
  .qexpl{border:1px solid var(--border);background:#040904;padding:11px 12px;font-family:'VT323';font-size:16px;color:var(--grey);line-height:1.34;margin-bottom:10px;max-height:240px;overflow:auto}
  .qexpl b{color:var(--cyan)} .qexpl .eh{font-family:'Press Start 2P';font-size:8px;color:var(--gold);letter-spacing:1px;display:block;margin-bottom:6px}

  /* result tape (the signature element + share artifact) */
  .tape{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:14px 0 6px}
  .sq{width:34px;height:34px;border:1px solid #000;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P';font-size:9px;color:#06100a}
  .sq.g{background:var(--green);box-shadow:0 0 8px var(--green)}
  .sq.y{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .sq.r{background:var(--red);box-shadow:0 0 8px var(--red);color:#fff}
  .sq.k{background:#2a3a1c;color:var(--grey)}
  .legend{font-family:'VT323';font-size:14px;color:var(--grey);text-align:center;line-height:1.5;margin-bottom:8px}
  .legend b.g{color:var(--green)} .legend b.y{color:var(--amber)} .legend b.r{color:var(--red)} .legend b.k{color:var(--grey)}

  .scoregrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
  .scoregrid .big{grid-column:1 / -1;border:1px solid var(--gold);background:#0a0804;padding:12px;text-align:center}
  .scoregrid .big .lbl{font-family:'Press Start 2P';font-size:8px;color:var(--gold);letter-spacing:1px;margin-bottom:6px}
  .scoregrid .big .val{font-family:'Press Start 2P';font-size:30px;color:var(--gold);text-shadow:0 0 12px var(--gold)}
  .scoregrid .cell{border:1px solid var(--border);background:#06100a;padding:9px 10px;text-align:center}
  .scoregrid .cell .lbl{font-family:'Press Start 2P';font-size:7px;color:var(--grey);letter-spacing:1px;margin-bottom:5px}
  .scoregrid .cell .val{font-family:'Press Start 2P';font-size:14px;color:var(--cyan);text-shadow:0 0 5px var(--cyan)}
  .scoregrid .cell.money .val{color:var(--money);text-shadow:0 0 5px var(--money)}
  .scoregrid .cell.amber .val{color:var(--amber);text-shadow:0 0 5px var(--amber)}

  .weakbox{border:1px solid var(--border);background:#06100a;padding:10px 12px;margin:8px 0 4px}
  .weakbox .wt{font-family:'Press Start 2P';font-size:8px;color:var(--red);letter-spacing:1px;margin-bottom:8px}
  .wrow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .wrow .wn{font-family:'VT323';font-size:15px;color:var(--white);flex:1;line-height:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .wrow .wbar{width:90px;height:8px;border:1px solid var(--border);background:#040904;flex-shrink:0}
  .wrow .wbar span{display:block;height:100%;background:var(--red);box-shadow:0 0 6px var(--red)}
  .wrow .wbar.ok span{background:var(--green);box-shadow:0 0 6px var(--green)}
  .wrow .wp{font-family:'Press Start 2P';font-size:7px;color:var(--grey);min-width:26px;text-align:right}

  .countdown{font-family:'Press Start 2P';font-size:11px;color:var(--cyan);text-shadow:0 0 6px var(--cyan);text-align:center;letter-spacing:1px;margin:8px 0}
  .toast{position:fixed;left:50%;transform:translateX(-50%);top:14px;z-index:300;font-family:'VT323';font-size:18px;padding:9px 16px;border:1px solid var(--green);background:#04140a;color:var(--white);max-width:90vw;text-align:center;opacity:0;transition:opacity .25s}
  .toast.show{opacity:1}
  .callout{position:fixed;left:50%;top:30%;transform:translate(-50%,-50%) scale(.5);z-index:280;font-family:'Press Start 2P';font-size:22px;color:var(--gold);text-shadow:0 0 16px var(--gold);opacity:0;pointer-events:none;text-align:center;width:90vw}
  .callout.show{animation:pop 1.2s}@keyframes pop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-55%) scale(1)}}
  .bump{animation:bump .2s}@keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
  .foot{font-family:'VT323';font-size:13px;color:var(--grey);text-align:center;margin-top:18px;line-height:1.4}
  .foot a{color:var(--grey);text-decoration:underline;text-underline-offset:3px}
  .foot a:hover{color:var(--cyan)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media(max-width:480px){.wrap{padding:12px 10px 50px}.qtext{font-size:18px}.sq{width:30px;height:30px}}
</style>

<body>
<!-- shared core: store / analytics / calibration / review / streak / sync (must load before daily logic) -->
<script src="aced-core.js"></script>
<!-- v8: career ladder + daily objectives (the Daily Close completes the day's anchor objective) -->
<script src="aced-progress.js"></script>
<!-- v9: game-feel + virality layer. Adds particle burst/flash + achievements + a more robust
     copy fallback to the Daily Close. It reuses daily's own sfx and its existing share text
     (which already carries the 4-state calibration glyph AND a friend-challenge link), so
     nothing is doubled — aced-fx only fills what the page was missing. -->
<script src="aced-fx.js"></script>
<script>
/* ===== PACK LOADER (shared with study.html) =====
   Reads ?pack= (defaults to cpa-far), loads packs/<id>.js -> window.ACED_PACK,
   then the pack's question banks (each appends to window.ACED_QUESTIONS),
   then calls window._dailyReady(). Identical strategy to study.html so the
   Daily Close is content-agnostic and works for any exam pack. */
(function loadPack(){
  const params=new URLSearchParams(window.location.search);
  const packId=(params.get('pack')||'cpa-far').replace(/[^a-z0-9._-]/gi,'');
  const ps=document.createElement('script');
  ps.src='packs/'+packId+'.js';
  ps.onerror=()=>{document.body.innerHTML='<div style="color:#ff5238;padding:40px;font-family:VT323,monospace;background:#000;height:100vh;font-size:22px">\u26a0 Pack not found: <b>'+packId+'</b>. Try <a style="color:#5cffea" href="daily.html?pack=cpa-far">daily.html?pack=cpa-far</a>.</div>';};
  ps.onload=()=>{
    const banks=(window.ACED_PACK&&window.ACED_PACK.questionBanks)||['packs/originals/far-original-batch-02.js','packs/originals/far-original-batch-03.js'];
    let i=0;(function next(){
      if(i>=banks.length){window._dailyReady&&window._dailyReady();return;}
      const s=document.createElement('script');s.src=banks[i++];s.onload=next;s.onerror=next;document.head.appendChild(s);
    })();
  };
  document.head.appendChild(ps);
})();
</script>

<div class="wrap" id="app" style="display:none"></div>
<div class="toast" id="toast"></div>
<div class="callout" id="callout"></div>

<script>
"use strict";
window._dailyReady=function(){
if(window._DAILY_BOOTED)return; window._DAILY_BOOTED=true;
const PACK=window.ACED_PACK||{};
const SECTION=(PACK.section)||(PACK.name)||"FAR";
const MODLABEL=PACK.modules||{};

/* ---- HTML-escape everything pack-/question-derived before innerHTML ---- */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}

/* ===== STORE — localStorage with in-memory fallback (sandbox/iframe-safe) =====
   Same pattern as study.html's ACED_STORE so Daily state persists wherever the
   game does, and degrades to a per-session cache where storage is blocked. */
const STORE=(function(){
  const NS="aced:"+((PACK&&PACK.id)?PACK.id:"default")+":";
  const mem={};let ok=false;
  try{const k="__p__";window["local"+"Storage"].setItem(k,"1");window["local"+"Storage"].removeItem(k);ok=true;}catch(e){ok=false;}
  function rd(k){if(ok){try{return window["local"+"Storage"].getItem(NS+k);}catch(e){return mem[k]==null?null:mem[k];}}return mem[k]==null?null:mem[k];}
  function wr(k,v){if(ok){try{window["local"+"Storage"].setItem(NS+k,v);return;}catch(e){mem[k]=v;return;}}mem[k]=v;}
  return{get(k,f){const r=rd(k);if(r==null)return f;try{return JSON.parse(r);}catch(e){return f;}},set(k,v){try{wr(k,JSON.stringify(v));}catch(e){}},persistent(){return ok;}};
})();

/* ===== DATE + SEED (deterministic shared daily) =====
   Local-midnight based so a player's "today" matches the Wordle-style mental
   model. The same date string seeds a mulberry32 RNG, so EVERY player sees the
   same Close on the same day — which is what makes scores comparable and the
   Friend Challenge (?date=) possible. */
const EPOCH=Date.UTC(2025,0,1); // Close #1 == 2025-01-01
function localMidnight(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();}
function dateKeyFor(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0');return y+"-"+m+"-"+da;}
function closeNumberFor(d){return Math.floor((localMidnight(d)-localMidnight(new Date(EPOCH)))/86400000)+1;}
function hashStr(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)>>>0;}return h>>>0;}
function mulberry32(a){return function(){a=(a+0x6D2B79F5)>>>0;let t=a;t=Math.imul(t^(t>>>15),t|1);t^=t+Math.imul(t^(t>>>7),t|61);return((t^(t>>>14))>>>0)/4294967296;};}

// Allow a ?date=YYYY-MM-DD override for Friend Challenge links / replays.
const _p=new URLSearchParams(window.location.search);
const NOW=new Date();
const TODAY_KEY=dateKeyFor(NOW);
let TARGET_KEY=TODAY_KEY, IS_TODAY=true;
if(_p.get('date')&&/^\d{4}-\d{2}-\d{2}$/.test(_p.get('date'))){TARGET_KEY=_p.get('date');IS_TODAY=(TARGET_KEY===TODAY_KEY);}
const CLOSE_NO=(function(){const[y,m,d]=TARGET_KEY.split('-').map(Number);return closeNumberFor(new Date(y,m-1,d));})();

/* ===== QUESTION BANK — normalize + validate ===== */
const RAW=window.ACED_QUESTIONS||window.ACED_FAR_COMBINED||(PACK.questions||[])||[];
const BANK=RAW.filter(q=>q&&typeof q.q==="string"&&Array.isArray(q.choices)&&q.choices.length>=2&&typeof q.answer==="number"&&q.answer>=0&&q.answer<q.choices.length)
  .map(q=>({q:q.q,choices:q.choices.slice(),answer:q.answer,explain:q.explain||"",source:q.source||"",diff:(q.diff||"medium")}));

const NUM_Q=Math.min(7,BANK.length||0);

/* Deterministic, stratified pick: round-robin across modules so a Close feels
   like a mini mock that spans the blueprint, not 7 clones of one topic. The RNG
   is seeded by date, so the selection is identical for all players that day. */
function pickDaily(key){
  if(!BANK.length)return [];
  const rng=mulberry32(hashStr(key+"|"+(PACK.id||"")));
  const shuffle=(arr)=>{const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
  const buckets={};BANK.forEach((q,idx)=>{(buckets[q.source]=buckets[q.source]||[]).push(idx);});
  const modOrder=shuffle(Object.keys(buckets));
  modOrder.forEach(m=>{buckets[m]=shuffle(buckets[m]);});
  const picked=[];const seen=new Set();let guard=0;
  while(picked.length<NUM_Q&&guard++<2000){
    let moved=false;
    for(const m of modOrder){
      if(picked.length>=NUM_Q)break;
      const b=buckets[m];
      while(b.length){const idx=b.shift();if(!seen.has(idx)){seen.add(idx);picked.push(BANK[idx]);moved=true;break;}}
    }
    if(!moved)break;
  }
  return picked;
}

/* ===== CONFIDENCE TIERS + SCORING =====
   You declare confidence BEFORE seeing the answer. Scoring is calibration-aware
   (Brier-style): being right AND confident pays the most; being wrong AND
   confident stings the most; low confidence is safe but capped. This is the
   skill the Daily quietly trains — and the reason it's habit-forming in a
   *healthy* way: you're chasing a calibration score, not a slot-machine payout. */
const BASE=100;
const TIERS={
  LOW:{prob:0.50,mult:1.0,wrong:0,cname:"NOT SURE",cmult:"50% \u00b7 \u00d71.0",risk:"safe \u2014 no sting if wrong"},
  MED:{prob:0.75,mult:1.5,wrong:-40,cname:"PRETTY SURE",cmult:"75% \u00b7 \u00d71.5",risk:"+50% \u00b7 small sting if wrong"},
  HIGH:{prob:0.95,mult:2.5,wrong:-100,cname:"LOCKED IN",cmult:"95% \u00b7 \u00d72.5",risk:"big payoff \u00b7 big sting"}
};
function pointsFor(correct,tier){const T=TIERS[tier];return correct?Math.round(BASE*T.mult):T.wrong;}
function brier(correct,tier){const p=TIERS[tier].prob,a=correct?1:0;return (p-a)*(p-a);}
// Result-tape glyph: encodes the calibration story, never the answer (spoiler-free).
function glyph(correct,tier){
  if(correct)return (tier==="HIGH")?"g":"y";   // g = called it confidently; y = right but hedged
  return (tier==="LOW")?"k":"r";                // k = hedged & missed (cheap); r = backed it & missed (costly)
}
const GLYPH_EMOJI={g:"\ud83d\udfe9",y:"\ud83d\udfe8",r:"\ud83d\udfe5",k:"\u2b1b"};

/* ===== STREAK MODEL (ethical) =====
   - One completion per day extends the streak.
   - A FREEZE token (earned every 7-day streak) is auto-spent to cover a single
     missed day, so real life doesn't nuke weeks of effort. Forgiveness, not
     punishment.
   - No completion + no freeze = streak resets to 0 (gently). */
const FREEZE_EVERY=7;
function loadDaily(){const s=STORE.get("dailyV1",{});return{
  currentStreak:s.currentStreak||0,longestStreak:s.longestStreak||0,
  lastDate:s.lastDate||null,freezes:s.freezes||0,
  results:s.results||{},                    // {dateKey:{score,correct,total,glyphs,calib,timeSec,bonus}}
  modSeen:s.modSeen||{},modCorrect:s.modCorrect||{},
  freezeUsedFor:s.freezeUsedFor||null
};}
function saveDaily(s){STORE.set("dailyV1",s);}
function prevKey(key){const[y,m,d]=key.split('-').map(Number);const dt=new Date(y,m-1,d-1);return dateKeyFor(dt);}

// Reconcile streak vs. calendar on load: if we've missed days since lastDate,
// spend a freeze to cover exactly one gap day, else reset.
function reconcileStreak(s){
  if(!s.lastDate)return s;
  // walk forward from lastDate to yesterday; each uncovered missed day breaks streak
  let cursor=s.lastDate;
  const yesterday=prevKey(TODAY_KEY);
  let missed=0;
  while(cursor!==yesterday&&cursor<yesterday){cursor=nextKey(cursor);if(cursor>TODAY_KEY)break;if(cursor===TODAY_KEY)break;missed++;}
  if(s.lastDate>=yesterday){return s;} // played today or yesterday: intact
  if(missed===1&&s.freezes>0){
    // one freeze covers exactly one gap day: spend it and advance lastDate to the
    // covered day (= yesterday) so the streak reads as unbroken on the next play.
    s.freezes-=1;s.freezeUsedFor=cursor;s.lastDate=cursor;return s;
  }
  if(missed>=1){s.currentStreak=0;} // multi-day gap, or a single gap with no freeze
  return s;
}
function nextKey(key){const[y,m,d]=key.split('-').map(Number);const dt=new Date(y,m-1,d+1);return dateKeyFor(dt);}

/* ===== FINISH — compute, persist, celebrate, render results ===== */
function finishRun(){
  let score=0,correct=0;const glyphs=[];let brierSum=0;
  const modSeen={},modCorrect={};
  run.picks.forEach((p,i)=>{
    const q=QS[i],ok=p.sel===q.answer;
    score+=pointsFor(ok,p.conf);correct+=ok?1:0;
    glyphs.push(glyph(ok,p.conf));brierSum+=brier(ok,p.conf);
    if(q.source){modSeen[q.source]=(modSeen[q.source]||0)+1;if(ok)modCorrect[q.source]=(modCorrect[q.source]||0)+1;}
  });
  const calib=Math.round((1-brierSum/run.picks.length)*100);
  const timeSec=Math.max(1,Math.round((Date.now()-run.startTs)/1000));
  const perfect=(correct===QS.length);
  const bonus=perfect?200:0;
  score=Math.max(0,score+bonus);

  const rec={score,correct,total:QS.length,glyphs,calib,timeSec,bonus,perfect,close:CLOSE_NO};

  // Persist result + advance streak (idempotent: replaying the same date won't double-count)
  const already=!!D.results[TARGET_KEY];
  D.results[TARGET_KEY]=rec;
  // Roll module mastery history (Daily's own view of strengths/weaknesses)
  Object.keys(modSeen).forEach(m=>{D.modSeen[m]=(D.modSeen[m]||0)+modSeen[m];});
  Object.keys(modCorrect).forEach(m=>{D.modCorrect[m]=(D.modCorrect[m]||0)+modCorrect[m];});

  if(!already&&IS_TODAY){
    // streak math: extend if yesterday was the last completed day (or first ever)
    const y=prevKey(TODAY_KEY);
    if(D.lastDate===y||D.currentStreak===0||D.lastDate==null){D.currentStreak=(D.lastDate===y)?D.currentStreak+1:1;}
    else if(D.lastDate===TODAY_KEY){/* shouldn't happen (already-guard) */}
    else {D.currentStreak=1;}
    D.lastDate=TODAY_KEY;
    D.longestStreak=Math.max(D.longestStreak||0,D.currentStreak);
    D.freezeUsedFor=null;
    // earn a freeze each time the streak crosses a 7-day multiple
    if(D.currentStreak>0&&D.currentStreak%FREEZE_EVERY===0){D.freezes=(D.freezes||0)+1;}
  }
  saveDaily(D);
  try{ if(window.ACEDCore){ ACEDCore.analytics.track("daily_completed",{score:rec.score,correct:rec.correct,total:rec.total,calib:rec.calib,streak:D.currentStreak,perfect:rec.perfect}); if(ACEDCore.sync) ACEDCore.sync.push(); } }catch(e){}
  mirrorMasteryToGame(modSeen,modCorrect); // bridge into study.html's Exam Readiness
  // v8: complete the day's anchor objective + award career XP (only a real, first, today completion counts)
  try{ if(window.ACEDProgress && !already && IS_TODAY){ _dailyProg=ACEDProgress.event("daily_completed",{correct:correct,total:QS.length,perfect:perfect,score:score}); } }catch(e){}

  if(perfect){sfx.win();setTimeout(()=>callout("PERFECT CLOSE +200","var(--gold)"),200);}
  else sfx.good();
  renderResults(rec,true);
}

  app.innerHTML=topbarHTML()+`<div class="card-shell">
    <div class="qmeta"><span class="mod">${esc(MODLABEL[q.source]||q.source||SECTION)}</span><span>REVIEW Q${i+1} / ${QS.length}</span><span class="diff">${esc(q.diff.toUpperCase())}</span></div>
    <div class="qtext">${esc(q.q)}</div>
    <div class="qchoices">${choices}</div>
    <div class="qexpl"><span class="eh">WHY</span>${esc(q.explain)||"(no explanation provided)"}</div>
    <div class="btnrow">
      <button class="btn ghost" id="rPrev"${i===0?' disabled':''}>\u2190 PREV</button>
      <button class="btn" id="rNext">${i<QS.length-1?'NEXT \u2192':'DONE'}</button>
    </div></div>`;
  wire_common();
  $("rPrev").onclick=()=>{if(run.idx>0){run.idx--;renderReview();}};
  $("rNext").onclick=()=>{if(run.idx<QS.length-1){run.idx++;renderReview();}else{run=null;renderHome();}};
}

function calibCoachLine(rec){
  const acc=rec.correct/rec.total;
  // crude over/under-confidence read from the tape
  const r=rec.glyphs.filter(g=>g==="r").length;  // overconfident misses
  const y=rec.glyphs.filter(g=>g==="y").length;  // underconfident hits
  let msg;
  if(rec.perfect&&rec.calib>=90)msg="Flawless and well-called. This is exactly the head you want on exam day.";
  else if(r>=2)msg="A couple of confident misses dragged you down \u2014 the fix isn't more studying, it's noticing when you only *think* you know.";
  else if(y>=3)msg="You knew more than you bet. Trust your prep \u2014 backing yourself when you're right is free points.";
  else if(acc>=0.7)msg="Solid. Tighten your confidence calls and the score climbs without learning a single new rule.";
  else msg="Rough Close \u2014 but every miss here is a miss you won't make on the real thing. Check the review.";
  return `<p class="muted" style="text-align:center;margin:2px 0 6px">${esc(msg)}</p>`;
}

/* ===== weakest-modules readout (cumulative across all Dailies) ===== */
function weakModulesHTML(){
  const mods=Object.keys(D.modSeen).filter(m=>D.modSeen[m]>=2);
  if(mods.length<2)return "";
  const rows=mods.map(m=>({m,seen:D.modSeen[m],pct:Math.round(100*(D.modCorrect[m]||0)/D.modSeen[m])}))
    .sort((a,b)=>a.pct-b.pct).slice(0,3);
  if(!rows.length)return "";
  return `<div class="weakbox"><div class="wt">YOUR WEAK SPOTS (ALL DAILIES)</div>`+
    rows.map(r=>`<div class="wrow"><span class="wn">${esc(MODLABEL[r.m]||r.m)}</span><span class="wbar ${r.pct>=70?'ok':''}"><span style="width:${r.pct}%"></span></span><span class="wp">${r.pct}%</span></div>`).join("")+
    `</div>`;
}

/* ===== SHARE — spoiler-free text + canvas card ===== */
function shareString(rec){
  const tape=rec.glyphs.map(g=>GLYPH_EMOJI[g]).join("");
  const lines=[
    `ACED \u2014 ${SECTION} Daily Close #${rec.close}`,
    tape,
    `Score ${rec.score} \u00b7 ${rec.correct}/${rec.total} \u00b7 calibration ${rec.calib}%${rec.perfect?" \u00b7 PERFECT":""}`,
    `Streak ${D.currentStreak}\ud83d\udd25`,
    `Same Close, your turn:`
  ];
  // include a friend-challenge link to this exact Close
  const base=location.href.split('?')[0];
  lines.push(`${base}?date=${TARGET_KEY}`);
  return lines.join("\n");
}
async function shareText(rec){
  const text=shareString(rec);
  function _award(){ try{ if(window.ACEDFX)ACEDFX.ach.unlock("share"); }catch(e){} }
  try{
    if(navigator.share){await navigator.share({title:"ACED Daily Close",text});toast("Shared.");_award();return;}
  }catch(e){/* fall through to clipboard */}
  // Prefer ACEDFX.copy (Clipboard API + an execCommand/textarea fallback for older Safari).
  let ok=false;
  try{ if(window.ACEDFX&&ACEDFX.copy){ ok=await ACEDFX.copy(text); } else { await navigator.clipboard.writeText(text); ok=true; } }catch(e){ ok=false; }
  if(ok){ toast("Result copied \u2014 paste it anywhere."); _award(); }
  else{
    // last-ditch: show a textarea to copy manually
    app.querySelector(".card-shell").insertAdjacentHTML("beforeend",`<textarea readonly style="width:100%;height:120px;margin-top:10px;background:#040904;color:var(--white);border:1px solid var(--border);font-family:VT323,monospace;font-size:16px">${esc(text)}</textarea>`);
    toast("Copy the text above.");
  }
}
function shareCard(rec){
  try{
    const url=makeCardDataURL(rec);
    const a=document.createElement('a');a.href=url;a.download=`aced-close-${rec.close}.png`;document.body.appendChild(a);a.click();a.remove();
    toast("Card saved.");
    try{ if(window.ACEDFX)ACEDFX.ach.unlock("share"); }catch(e){}
  }catch(e){toast("Couldn't render card \u2014 use SHARE RESULT instead.");}
}
function makeCardDataURL(rec){
  const c=document.createElement('canvas');c.width=1200;c.height=630;const x=c.getContext('2d');
  // bg
  const g=x.createLinearGradient(0,0,1200,630);g.addColorStop(0,'#06100a');g.addColorStop(1,'#0d1409');x.fillStyle=g;x.fillRect(0,0,1200,630);
  // scanline hint
  x.globalAlpha=0.06;x.fillStyle='#000';for(let yy=0;yy<630;yy+=4)x.fillRect(0,yy,1200,1);x.globalAlpha=1;
  // accents
  x.fillStyle='#22ff66';x.fillRect(0,0,1200,8);x.fillStyle='#ff5cb8';x.fillRect(0,622,1200,8);
  // logo
  x.fillStyle='#22ff66';x.font='bold 64px "Courier New",monospace';x.fillText('ACED',60,108);
  x.fillStyle='#5a7058';x.font='26px "Courier New",monospace';x.fillText(`${SECTION} \u00b7 Daily Close #${rec.close}`,60,150);
  // tape
  const sz=96,gap=16,startX=60,ty=210;const colors={g:'#22ff66',y:'#ffb627',r:'#ff5238',k:'#2a3a1c'};
  rec.glyphs.forEach((gl,i)=>{x.fillStyle=colors[gl];const px=startX+i*(sz+gap);x.fillRect(px,ty,sz,sz);
    if(gl==='g'){x.fillStyle='#06100a';x.font='bold 56px "Courier New",monospace';x.fillText('\u2713',px+26,ty+66);}
    if(gl==='r'){x.fillStyle='#fff';x.font='bold 52px "Courier New",monospace';x.fillText('\u2715',px+26,ty+64);}
  });
  // big score
  x.fillStyle='#ffd23f';x.font='bold 150px "Courier New",monospace';x.fillText(String(rec.score),60,470);
  x.fillStyle='#5a6a55';x.font='26px "Courier New",monospace';x.fillText('SCORE',64,505);
  // stat strip
  const stats=[['ACCURACY',`${rec.correct}/${rec.total}`,'#5cffea'],['CALIBRATION',`${rec.calib}%`,'#ffb627'],['STREAK',`${D.currentStreak}d`,'#9be36b']];
  let sx=560;stats.forEach(([l,v,col])=>{x.fillStyle=col;x.font='bold 54px "Courier New",monospace';x.fillText(v,sx,455);x.fillStyle='#5a6a55';x.font='20px "Courier New",monospace';x.fillText(l,sx,485);sx+=220;});
  // tagline
  x.fillStyle='#ff5cb8';x.font='italic 28px "Courier New",monospace';x.fillText(rec.perfect?'Perfect Close. Calibrated and clean.':'Study FAR like a deckbuilding roguelike.',60,580);
  return c.toDataURL('image/png');
}
function recordToLeaderboard(rec){
  // reuse social.js if present (local leaderboard), harmless if absent
  try{ if(window.ACEDSocial&&window.ACEDSocial.recordRun){window.ACEDSocial.recordRun({score:rec.score,section:SECTION,ante:0,streak:D.currentStreak,bossesDefeated:0});} }catch(e){}
}

/* ===== countdown to next Close ===== */
let cdT=null;
function startCountdown(){
  const el=$("cd");if(!el)return;clearInterval(cdT);
  function tick(){
    const now=new Date();const mid=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1).getTime();
    let s=Math.max(0,Math.floor((mid-now.getTime())/1000));
    const h=String(Math.floor(s/3600)).padStart(2,'0');s%=3600;const m=String(Math.floor(s/60)).padStart(2,'0');const ss=String(s%60).padStart(2,'0');
    el.textContent=`NEXT CLOSE IN ${h}:${m}:${ss}`;
  }
  tick();cdT=setInterval(tick,1000);
}

/* ===== ETHICAL COMEBACK NUDGE =====
   If a streak is alive and today's Close isn't filed yet, flip the *tab title*
   to a calm, factual reminder when the tab is hidden — and restore it on return.
   Deliberately NOT fear copy ("your streak ends tonight!"): the goal is a helpful
   nudge, not anxiety. Loss aversion sells, but the user asked for "addictive in a
   GOOD way", so this stays supportive. */
const BASE_TITLE=document.title;
function maybeNudge(){
  const doneToday=!!D.results[TODAY_KEY];
  if(document.hidden&&D.currentStreak>0&&!doneToday){
    document.title=`\u2022 Today's Close is open \u2014 ACED (${D.currentStreak}d streak)`;
  } else {
    document.title=BASE_TITLE;
  }
}
document.addEventListener("visibilitychange",maybeNudge);

/* ===== formatting helpers ===== */
function fmtLong(key){const[y,m,d]=key.split('-').map(Number);const dt=new Date(y,m-1,d);return dt.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});}
function fmtTime(s){if(s<60)return s+"s";const m=Math.floor(s/60);return m+"m "+(s%60)+"s";}
function bump(el){if(!el)return;el.classList.remove("bump");void el.offsetWidth;el.classList.add("bump");}

/* ===== boot ===== */
app.style.display="block";
try{ if(window.ACEDCore&&ACEDCore.sync) ACEDCore.sync.pull(); }catch(e){} // cross-device sync (no-op until backend configured)
renderHome();
}; // ===== end _dailyReady =====
</script>
