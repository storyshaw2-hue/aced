<style>

    --bg:#070b08; --bg2:#0d1409; --panel:#0a160a; --panel2:#06100a; --border:#16291a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#000;color:var(--white);font-family:'VT323',ui-monospace,monospace;font-size:20px;line-height:1.25;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
  body{background:radial-gradient(ellipse at center,var(--bg2),#000),var(--bg);min-height:100vh;position:relative}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:200;background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0,rgba(0,0,0,.16) 1px,transparent 1px,transparent 3px)}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:199;background:radial-gradient(ellipse at center,transparent 58%,rgba(0,0,0,.6))}

  header{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,var(--bg),rgba(7,11,8,.85));border-bottom:1px solid var(--border);backdrop-filter:blur(3px)}

  @keyframes blink{50%{opacity:0}}
  .navlinks{display:flex;gap:8px}
  .chip{font-family:'Press Start 2P';font-size:8px;border:1px solid var(--border);background:var(--panel);color:var(--grey);padding:8px 10px}
  .chip:hover{color:var(--green);border-color:var(--green-dim)}
  .chip.on{color:var(--cyan);border-color:#0a4a4a}

  .wrap{max-width:820px;margin:0 auto;padding:20px 14px 60px;position:relative;z-index:1}

  /* HUD */
  .hud{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .hud .cell{flex:1;min-width:90px;border:1px solid var(--border);background:var(--panel2);padding:8px 9px;text-align:center}

  .hud .hl{font-family:'VT323';font-size:13px;color:var(--grey);margin-top:3px;letter-spacing:1px}
  .hud .cell.score .hv{color:var(--gold)}
  .hud .cell.par .hv{color:var(--amber)}
  .hud .cell.lives .hv{color:var(--magenta)}

  .bar{height:10px;background:#050d06;border:1px solid var(--border);margin:0 0 18px;position:relative;overflow:hidden}

  .eyebrow{font-family:'Press Start 2P';font-size:9px;color:var(--cyan);letter-spacing:2px;margin-bottom:10px;text-transform:uppercase}

  .stem{font-family:'VT323';font-size:22px;color:var(--white);line-height:1.28;margin:0 0 18px}

  .choices{display:flex;flex-direction:column;gap:10px}

  .choice .k{font-family:'Press Start 2P';font-size:11px;color:var(--cyan);flex:0 0 auto;margin-top:2px}

  .conv{margin:0 0 16px}

  .convrow{display:flex;gap:8px}
  .cbtn{flex:1;font-family:'Press Start 2P';font-size:9px;padding:11px 6px;text-align:center;cursor:pointer;border:1px solid var(--border);background:#06100a;color:var(--grey);letter-spacing:1px;transition:border-color .1s,color .1s,box-shadow .1s}

  .explain{margin-top:16px;border:1px solid var(--border);background:var(--panel2);padding:14px;font-family:'VT323';font-size:17px;line-height:1.32}

  /* title / result screens */
  .center{text-align:center}
  h1{font-family:'Press Start 2P';font-size:clamp(18px,3.6vw,26px);line-height:1.4;color:var(--white);text-shadow:0 0 14px rgba(34,255,102,.28);margin:0 0 14px}
  h1 .hl{color:var(--green)}
  .lede{font-size:19px;color:var(--white);max-width:60ch;margin:0 auto 8px}
  .lede b{color:var(--cyan)}
  .subtle{font-size:15px;color:var(--grey);max-width:60ch;margin:10px auto 0}
  .packline{font-family:'Press Start 2P';font-size:10px;color:var(--gold);text-shadow:0 0 6px var(--gold);margin:18px 0 4px}
  .packexam{font-family:'VT323';font-size:16px;color:var(--cyan);margin-bottom:6px}
  .modes{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:26px}
  .modecard{flex:1;min-width:240px;max-width:340px;border:2px solid var(--border);background:linear-gradient(180deg,var(--panel),#040904);padding:18px;cursor:pointer;transition:border-color .12s,box-shadow .12s,transform .12s;text-align:left}
  .modecard:hover{transform:translateY(-3px)}
  .modecard.study{border-color:#7a5e0f}
  .modecard.study:hover{border-color:var(--gold);box-shadow:0 0 16px rgba(255,210,63,.3)}
  .modecard.pure{border-color:var(--green-dim)}
  .modecard.pure:hover{border-color:var(--green);box-shadow:0 0 16px rgba(34,255,102,.3)}
  .modecard .mt{font-family:'Press Start 2P';font-size:13px;margin-bottom:10px}
  .modecard.study .mt{color:var(--gold)} .modecard.pure .mt{color:var(--green)}
  .modecard .md{font-family:'VT323';font-size:16px;color:var(--white);line-height:1.25}
  .big{font-family:'Press Start 2P';font-size:clamp(20px,5vw,34px);letter-spacing:2px}
  .big.win{color:var(--gold);text-shadow:0 0 16px var(--gold)}
  .big.lose{color:var(--red);text-shadow:0 0 14px var(--red)}
  footer{border-top:1px solid var(--border);margin-top:40px;padding:22px 0 10px;color:var(--grey);font-size:15px;text-align:center}
  footer a{color:var(--grey);text-decoration:underline;text-underline-offset:3px}
  footer a:hover{color:var(--white)}
  .banner{border:1px solid var(--amber);background:#140f03;color:var(--amber);font-family:'VT323';font-size:15px;padding:10px 12px;margin-bottom:16px;line-height:1.3}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media(max-width:520px){ .navlinks .chip{font-size:7px;padding:7px 8px} .stem{font-size:20px} }
  /* reading comfort — opt-in, off by default (toggled by the Aa control) */
  html.aced-read body::before, html.aced-read body::after{display:none!important}
  html.aced-read *{text-shadow:none!important}
  html.aced-read body{background:#0c120d!important}
  html.aced-zoom body{zoom:1.12}
  #readfab{position:fixed;right:12px;bottom:12px;z-index:400;font-family:'Press Start 2P';font-size:11px;width:42px;height:42px;border:1px solid var(--border,#16291a);background:#0a160a;color:var(--cyan,#5cffea);cursor:pointer}
  #readfab:hover{border-color:var(--cyan,#5cffea);box-shadow:0 0 8px var(--cyan,#5cffea)}
  #readpanel{position:fixed;right:12px;bottom:62px;z-index:400;background:#0a160a;border:1px solid var(--border,#16291a);padding:12px 14px;width:216px;font-family:'VT323',ui-monospace,monospace;font-size:17px;color:#d8f5d8}
  #readpanel[hidden]{display:none}
  #readpanel h4{font-family:'Press Start 2P';font-size:9px;color:var(--cyan,#5cffea);margin:0 0 10px;letter-spacing:1px}
  #readpanel label{display:flex;align-items:center;gap:9px;margin:9px 0;cursor:pointer}
  #readpanel input{accent-color:var(--green,#22ff66);width:16px;height:16px;flex:none}
  #readpanel .hint{color:#5a7058;font-size:14px;line-height:1.25;margin-top:8px}
</style>

<header>
  <div class="nav">
    <div class="brand">ACED<span class="blink">_</span></div>
    <nav class="navlinks">
      <a class="chip" href="index.html">MENU</a>
      <a class="chip" href="store.html">STORE</a>
      <a class="chip on" href="aced-arcade.html">PLAY</a>
    </nav>
  </div>
</header>

<div class="wrap" id="app"></div>

<script>
"use strict";
/* =====================================================================
   ACED ARCADE — slim universal-pack roguelike engine.
   Plays with nothing loaded; slot in any pack and every run drills it.

   PACK RESOLUTION ORDER (per STORE-AND-PACKS.md):
     1. ?pack=<url|id>  — fetch JSON (or a known id -> hosted JSON)
     2. window.ACED_PACK = {title, exam, questions:[...]}
     3. window.ACED_QUESTIONS = [...]  (bare array)
     4. built-in domain-neutral demo quiz
   ===================================================================== */

const app = document.getElementById("app");
const params = new URLSearchParams(location.search);

/* Known pack ids -> hosted slim JSON (keeps old ?pack=<id> deep links alive).
   The heavy per-section banks (FAR/AUD/REG) are all inside the merged CPA pack. */
const PACK_ALIASES = {
  "cpa":"packs/cpa.json", "cpa-far":"packs/cpa.json", "cpa-aud":"packs/cpa.json",
  "cpa-reg":"packs/cpa.json", "cpa-sample":"packs/cpa-sample.json",
  "cpa-bar":"packs/bar.json", "bar":"packs/bar.json", "cpa-bar-sample":"packs/bar-sample.json"
};

/* Built-in demo: domain-neutral, so the arcade is fun with zero study content. */
const DEMO = {
  title:"ACED ARCADE", exam:"No pack loaded — demo quiz",
  questions:[
    {stem:"Which planet is the largest in our solar system?",choices:["Earth","Jupiter","Saturn","Neptune"],answer:1,explanation:"Jupiter is the most massive planet — more than twice the mass of all the others combined."},
    {stem:"In a standard deck of cards, how many suits are there?",choices:["2","3","4","5"],answer:2,explanation:"Four suits: hearts, diamonds, clubs, spades."},
    {stem:"What is the value of pi to two decimal places?",choices:["3.12","3.14","3.16","3.18"],answer:1,explanation:"Pi is approximately 3.14159…"},
    {stem:"Which of these is a prime number?",choices:["21","27","29","33"],answer:2,explanation:"29 has no divisors other than 1 and itself."},
    {stem:"Water freezes at what temperature in Celsius?",choices:["-10","0","10","32"],answer:1,explanation:"0°C at standard pressure. 32 is the Fahrenheit value."},
    {stem:"What is the chemical symbol for gold?",choices:["Go","Gd","Au","Ag"],answer:2,explanation:"Au, from the Latin 'aurum'. Ag is silver."},
    {stem:"How many continents are there on Earth?",choices:["5","6","7","8"],answer:2,explanation:"Seven: Africa, Antarctica, Asia, Europe, North America, Oceania, South America."},
    {stem:"Which language has the most native speakers?",choices:["English","Spanish","Mandarin Chinese","Hindi"],answer:2,explanation:"Mandarin Chinese has the most native speakers worldwide."},
    {stem:"What is the square root of 144?",choices:["11","12","13","14"],answer:1,explanation:"12 × 12 = 144."},
    {stem:"In music, how many notes are in an octave (inclusive of both ends)?",choices:["6","7","8","12"],answer:2,explanation:"Eight notes span an octave (do-re-mi-fa-sol-la-ti-do)."},
    {stem:"Which gas do plants primarily absorb for photosynthesis?",choices:["Oxygen","Nitrogen","Carbon dioxide","Hydrogen"],answer:2,explanation:"Plants take in CO2 and release oxygen."},
    {stem:"What is 15% of 200?",choices:["15","25","30","35"],answer:2,explanation:"0.15 × 200 = 30."}
  ]
};

/* Field-tolerant normalizer: keep only well-formed rows. */
function normalize(rows){
  const out=[];
  (rows||[]).forEach(r=>{
    if(!r || typeof r!=="object") return;
    const stem = r.stem || r.q || r.prompt;
    const choices = r.choices;
    const answer = r.answer;
    if(!stem || !Array.isArray(choices) || choices.length<2) return;
    if(!Number.isInteger(answer) || answer<0 || answer>=choices.length) return;
    out.push({
      stem:String(stem),
      choices:choices.map(String),
      answer:answer,
      explanation:(r.explanation||r.explain) ? String(r.explanation||r.explain) : "",
      module:(r.module||r.moduleKey||r.section||r.topic) ? String(r.module||r.moduleKey||r.section||r.topic) : ""
    });
  });
  return out;
}

function resolvePackUrl(raw){
  if(!raw) return null;
  // a path/URL if it has a slash or ends in .json; otherwise treat as an id
  if(/[\/.]/.test(raw) && (raw.indexOf("/")>=0 || /\.json$/i.test(raw))) return raw;
  const id = raw.replace(/[^a-z0-9._-]/gi,"");
  return PACK_ALIASES[id] || ("packs/"+id+".json");
}

async function loadPack(){
  const raw = params.get("pack");
  if(raw==="local"){
    // pack handed off from the importer (build/upload -> Play now), no hosting needed
    try{
      const data = JSON.parse(localStorage.getItem("aced_custom_pack")||"null");
      const qs = data && normalize(data.questions || data);
      if(qs && qs.length) return {title:(data.title||"My Pack"),exam:(data.exam||""),questions:qs,source:"local"};
      return {error:"No imported pack found. Build one in the importer, then hit Play."};
    }catch(e){ return {error:"Couldn’t read the imported pack ("+e.message+")."}; }
  }
  if(raw){
    const url = resolvePackUrl(raw);
    try{
      const res = await fetch(url,{cache:"no-store"});
      if(!res.ok) throw new Error("HTTP "+res.status);
      const data = await res.json();
      const qs = normalize(data.questions || data);
      if(qs.length) return {title:data.title||"Study Pack",exam:data.exam||"",questions:qs,source:"url"};
      throw new Error("no valid questions in pack");
    }catch(e){
      return {error:"Couldn’t load pack: "+url+" ("+e.message+")"};
    }
  }
  if(window.ACED_PACK && Array.isArray(window.ACED_PACK.questions)){
    const qs=normalize(window.ACED_PACK.questions);
    if(qs.length) return {title:window.ACED_PACK.title||"Study Pack",exam:window.ACED_PACK.exam||"",questions:qs,source:"ACED_PACK"};
  }
  if(Array.isArray(window.ACED_QUESTIONS) && window.ACED_QUESTIONS.length){
    const qs=normalize(window.ACED_QUESTIONS);
    if(qs.length) return {title:"Study Pack",exam:"",questions:qs,source:"ACED_QUESTIONS"};
  }
  return {title:DEMO.title,exam:DEMO.exam,questions:normalize(DEMO.questions),source:"demo"};
}

/* ===== game constants ===== */
const ANTES = 8;
const HANDS_PER_ANTE = 5;
const BASE_CHIPS = 100;
const CONV = {low:{mult:1,label:"HUNCH",m:"×1"}, med:{mult:2,label:"CONFIDENT",m:"×2"}, high:{mult:3,label:"CERTAIN",m:"×3"}};
function parFor(ante){ return 250 + (ante-1)*150; } // 250,400,…,1300
const SR_INTERVAL=[1,3,7,14,30]; // spaced-repetition intervals (question-ticks) by mastery box

function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ===== game state ===== */
let PACK=null, STUDY=false;
let state=null;

function newRun(){
  const deck = shuffle(PACK.questions.slice());
  state = {
    ante:1, hand:0, score:0, deck, deckPos:0,
    streak:0, best:0, answeredTotal:0, correctTotal:0,
    convBet:0, convHit:0, // calibration: high-conviction attempts / hits
    conviction:"med", picked:null, revealed:false, over:false, won:false,
    sched: PACK.questions.map((q,i)=>({i,box:0,due:0,seen:false})), tick:0, curEntry:null, _isReview:false
  };
  nextQuestion();
}

function drawQuestion(){
  // Leitner scheduler: serve the most-overdue card; unseen interleave; ties random.
  state.tick++;
  const pool=state.sched.slice().sort((a,b)=>(a.due-b.due)||((a.seen?1:0)-(b.seen?1:0))||(Math.random()-0.5));
  const e=pool[0]; state.curEntry=e; state._isReview=e.seen; return PACK.questions[e.i];
}
function scheduleAfter(correct){
  const e=state.curEntry; if(!e) return;
  if(correct) e.box=Math.min(4,e.box+1);
  else e.box=(state.conviction==="high")?0:Math.max(0,e.box-1); // a confident miss resets hardest
  e.seen=true; e.due=state.tick+SR_INTERVAL[Math.min(SR_INTERVAL.length-1,e.box)];
}
function schedStats(){ const s=(state&&state.sched)||[]; return {seen:s.filter(e=>e.seen).length,mastered:s.filter(e=>e.box>=4).length,due:s.filter(e=>e.seen&&e.due<=state.tick).length,total:s.length}; }
function nextQuestion(){
  state.current = drawQuestion();
  state.conviction="med"; state.picked=null; state.revealed=false;
  render();
}

function pick(i){
  if(state.revealed) return;
  state.picked=i; state.revealed=true;
  const q=state.current, correct = (i===q.answer);
  const c=CONV[state.conviction];
  state.answeredTotal++;
  if(state.conviction==="high"){ state.convBet++; if(correct) state.convHit++; }
  let gained=0;
  if(correct){
    state.correctTotal++; state.streak++;
    if(state.streak>state.best) state.best=state.streak;
    const streakMult = 1 + Math.min(state.streak-1,5)*0.2; // up to ×2 at streak 6+
    gained = Math.round(BASE_CHIPS * c.mult * streakMult);
    state.score += gained;
  } else {
    state.streak=0;
  }
  scheduleAfter(correct);
  state.lastGain=gained; state.lastCorrect=correct;
  render();
}

function advance(){
  state.hand++;
  if(state.hand>=HANDS_PER_ANTE){
    // end of ante: check PAR
    if(state.score>=parFor(state.ante)){
      if(state.ante>=ANTES){ state.won=true; state.over=true; render(); return; }
      state.ante++; state.hand=0;
      renderAnteClear(); return;
    } else {
      state.over=true; render(); return;
    }
  }
  nextQuestion();
}

/* ===== rendering ===== */
function hudHTML(){
  const par=parFor(state.ante);
  const pct=Math.min(100,Math.round(state.score/par*100));
  const hit=state.score>=par;
  return (
    '<div class="hud">'+
      '<div class="cell"><div class="hv">'+state.ante+'/'+ANTES+'</div><div class="hl">ANTE</div></div>'+
      '<div class="cell"><div class="hv">'+(state.hand+1)+'/'+HANDS_PER_ANTE+'</div><div class="hl">HAND</div></div>'+
      '<div class="cell score"><div class="hv">'+state.score+'</div><div class="hl">CHIPS</div></div>'+
      '<div class="cell par"><div class="hv">'+par+'</div><div class="hl">PAR</div></div>'+
      '<div class="cell"><div class="hv">'+state.streak+'</div><div class="hl">STREAK</div></div>'+
    '</div>'+
    '<div class="bar'+(hit?" hit":"")+'"><i style="width:'+pct+'%"></i></div>'+
    (STUDY?('<div style="font-family:VT323;font-size:14px;color:var(--grey);text-align:center;margin-top:6px">reviews due <b style="color:var(--cyan)">'+schedStats().due+'</b> \u00b7 mastered <b style="color:var(--gold)">'+schedStats().mastered+'/'+schedStats().total+'</b></div>'):'')
  );
}

function convHTML(){
  if(!STUDY) return "";
  const rows = Object.keys(CONV).map(k=>{
    const c=CONV[k];
    return '<button class="cbtn'+(state.conviction===k?" on":"")+'" data-conv="'+k+'">'+c.label+'<span class="m">'+c.m+' chips</span></button>';
  }).join("");
  return '<div class="conv"><div class="lbl">SET YOUR CONVICTION, THEN ANSWER</div><div class="convrow">'+rows+'</div></div>';
}

function render(){
  if(state.over){ renderResult(); return; }
  const q=state.current;
  const letters=["A","B","C","D","E","F"];
  const choiceHTML = q.choices.map((ch,i)=>{
    let cls="choice";
    if(state.revealed){
      if(i===q.answer) cls+=" correct";
      else if(i===state.picked) cls+=" wrong";
    }
    return '<button class="'+cls+'" data-choice="'+i+'"'+(state.revealed?" disabled":"")+'>'+
      '<span class="k">'+letters[i]+'</span><span>'+esc(ch)+'</span></button>';
  }).join("");

  let after="";
  if(state.revealed){
    const ok=state.lastCorrect;
    const deltaCls = state.lastGain>0?"plus":"zero";
    const deltaTxt = state.lastGain>0?("+"+state.lastGain+" chips"):(ok?"+0":"MISS — 0 chips, streak reset");
    const expl = q.explanation ? '<div class="explain '+(ok?"ok":"no")+'"><div class="delta '+deltaCls+'">'+deltaTxt+'</div>'+esc(q.explanation)+'</div>'
                               : '<div class="explain '+(ok?"ok":"no")+'"><div class="delta '+deltaCls+'">'+deltaTxt+'</div>'+(ok?"Correct.":"Not quite — the highlighted choice was correct.")+'</div>';
    after = (STUDY?expl:'<div class="explain '+(ok?"ok":"no")+'"><div class="delta '+deltaCls+'">'+deltaTxt+'</div>'+(ok?"Correct.":"The highlighted choice was correct.")+'</div>')+
      '<div class="btnrow"><button class="btn go" id="nextBtn">'+(state.hand+1>=HANDS_PER_ANTE?"FINISH ANTE ▶":"NEXT ▶")+'</button></div>';
  }

  app.innerHTML =
    hudHTML()+
    '<div class="panel">'+
      '<div class="eyebrow">'+(STUDY?"STUDY RUN":"PURE PLAY")+' · '+esc(PACK.title)+'</div>'+
      ((state._isReview||q.module)?'<div class="module">'+(state._isReview?'\u21BB REVIEW'+(q.module?' \u00b7 ':''):'')+(q.module?esc(q.module):'')+'</div>':'')+
      convHTML()+
      '<div class="stem">'+esc(q.stem)+'</div>'+
      '<div class="choices">'+choiceHTML+'</div>'+
      after+
    '</div>';

  app.querySelectorAll("[data-conv]").forEach(b=>b.onclick=()=>{ if(state.revealed)return; state.conviction=b.dataset.conv; render(); });
  app.querySelectorAll("[data-choice]").forEach(b=>b.onclick=()=>pick(+b.dataset.choice));
  const nb=document.getElementById("nextBtn"); if(nb) nb.onclick=advance;
}

function renderAnteClear(){
  app.innerHTML = hudHTML()+
    '<div class="panel center">'+
      '<div class="eyebrow">ante cleared</div>'+
      '<h1>PAR beaten. <span class="hl">Ante '+state.ante+'</span> next.</h1>'+
      '<p class="lede">Chips banked: <b>'+state.score+'</b> · best streak <b>'+state.best+'</b>. The PAR rises to <b>'+parFor(state.ante)+'</b>.</p>'+
      '<div class="btnrow" style="max-width:320px;margin:22px auto 0"><button class="btn go" id="contBtn">CONTINUE ▶</button></div>'+
    '</div>';
  document.getElementById("contBtn").onclick=nextQuestion;
}

function renderResult(){
  const acc = state.answeredTotal? Math.round(state.correctTotal/state.answeredTotal*100):0;
  const calib = state.convBet? Math.round(state.convHit/state.convBet*100):null;
  const win = state.won;
  let calibLine="";
  if(STUDY && state.convBet){
    calibLine = '<p class="subtle">Calibration: when you were <b style="color:var(--gold)">CERTAIN</b> you were right <b>'+calib+'%</b> of the time ('+state.convHit+'/'+state.convBet+'). '+
      (calib>=85?"Well calibrated — your confidence matches your accuracy."
       :calib>=60?"Slightly overconfident — reserve CERTAIN for the ones you truly know."
       :"Overconfident — high-conviction misses cost you nothing here, but on the real exam they cost points.")+'</p>';
  }
  let masteryLine="";
  if(STUDY){ const ss=schedStats(); masteryLine='<p class="subtle">Spaced review: mastered <b>'+ss.mastered+'</b>/'+ss.total+' questions this run.</p>'; }
  app.innerHTML =
    '<div class="panel center">'+
      '<div class="eyebrow">'+(win?"run complete":"game over")+'</div>'+
      '<div class="big '+(win?"win":"lose")+'">'+(win?"YOU ACED IT":"BUSTED")+'</div>'+
      '<p class="lede" style="margin-top:16px">'+(win
        ? "You cleared all "+ANTES+" antes."
        : "You missed PAR on ante "+state.ante+".")+
        ' Final chips: <b>'+state.score+'</b>.</p>'+
      '<p class="subtle">Answered '+state.answeredTotal+' questions at <b>'+acc+'%</b> accuracy · best streak <b>'+state.best+'</b>.</p>'+
      calibLine+ masteryLine+
      '<div class="btnrow" style="max-width:420px;margin:24px auto 0">'+
        '<button class="btn go" id="againBtn">PLAY AGAIN</button>'+
        '<button class="btn" id="shareBtn" style="color:var(--gold);border-color:#7a5e0f;background:#0d0b03">SHARE</button>'+
      '</div>'+
      '<div class="btnrow" style="max-width:420px;margin:10px auto 0">'+
        '<a class="btn alt" href="store.html">GET MORE PACKS</a>'+
      '</div>'+
      '<div id="shareHolder" style="margin:18px auto 0;max-width:600px"></div>'+
      '<div id="shareNote" class="subtle" style="margin-top:8px"></div>'+
    '</div>';
  document.getElementById("againBtn").onclick=()=>{ newRun(); };
  document.getElementById("shareBtn").onclick=doShare;
}

/* ---------- shareable result card (growth loop) ---------- */
function shareText(){
  const acc=state.answeredTotal?Math.round(state.correctTotal/state.answeredTotal*100):0;
  const tag=state.won?("aced all "+ANTES+" antes"):("busted on ante "+state.ante);
  const cal=(STUDY&&state.convBet)?(" · "+Math.round(state.convHit/state.convBet*100)+"% calibrated"):"";
  const pk=PACK.source==="demo"?"the demo":(PACK.title||"a pack");
  return "ACED — I "+tag+" on "+pk+": "+state.score+" chips, "+acc+"% accuracy"+cal+". Study anything like a roguelike → acedhq.com";
}
async function buildShareCard(){
  try{ if(document.fonts&&document.fonts.ready) await document.fonts.ready; }catch(e){}
  const W=1200,H=630,c=document.createElement("canvas"); c.width=W; c.height=H;
  const x=c.getContext("2d");
  x.fillStyle="#070b08"; x.fillRect(0,0,W,H);
  x.strokeStyle="rgba(0,0,0,0.30)"; x.lineWidth=1;
  for(let y=0;y<H;y+=3){ x.beginPath(); x.moveTo(0,y); x.lineTo(W,y); x.stroke(); }
  x.strokeStyle="#16291a"; x.lineWidth=4; x.strokeRect(20,20,W-40,H-40);
  const acc=state.answeredTotal?Math.round(state.correctTotal/state.answeredTotal*100):0;
  const win=state.won;
  x.textBaseline="alphabetic"; x.textAlign="left";
  x.font="40px 'Press Start 2P', monospace"; x.fillStyle="#22ff66"; x.shadowColor="#22ff66"; x.shadowBlur=18; x.fillText("ACED",60,100); x.shadowBlur=0;
  x.font="28px 'VT323', monospace"; x.fillStyle="#5cffea"; x.textAlign="right"; x.fillText((PACK.source==="demo"?"demo quiz":(PACK.exam||PACK.title||"")).slice(0,42),W-60,96); x.textAlign="left";
  x.font="72px 'Press Start 2P', monospace"; x.fillStyle=win?"#22ff66":"#ff5238"; x.shadowColor=x.fillStyle; x.shadowBlur=24; x.fillText(win?"YOU ACED IT":"BUSTED",60,300); x.shadowBlur=0;
  x.font="40px 'VT323', monospace"; x.fillStyle="#d8f5d8"; x.fillText(state.score+" chips  \u00b7  "+acc+"% accuracy  \u00b7  best streak "+state.best,60,380);
  if(STUDY&&state.convBet){ x.font="34px 'VT323', monospace"; x.fillStyle="#ffd23f"; x.fillText("calibration: "+Math.round(state.convHit/state.convBet*100)+"% right when certain",60,442); }
  if(STUDY){ const ss=schedStats(); x.font="30px 'VT323', monospace"; x.fillStyle="#9be36b"; x.fillText("mastered "+ss.mastered+"/"+ss.total+" this run",60,490); }
  x.font="34px 'VT323', monospace"; x.fillStyle="#5a7058"; x.fillText("study anything like a roguelike",60,H-96);
  x.font="30px 'Press Start 2P', monospace"; x.fillStyle="#22ff66"; x.fillText("acedhq.com",60,H-48);
  return c;
}
async function doShare(){
  const note=document.getElementById("shareNote"), holder=document.getElementById("shareHolder");
  note.textContent="building card\u2026";
  const canvas=await buildShareCard();
  canvas.style.cssText="max-width:100%;height:auto;display:block;margin:0 auto;border:1px solid #16291a";
  holder.innerHTML=""; holder.appendChild(canvas);
  const txt=shareText();
  canvas.toBlob(async (blob)=>{
    const file=blob?new File([blob],"aced-result.png",{type:"image/png"}):null;
    if(file&&navigator.canShare&&navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file],text:txt,title:"ACED"}); note.textContent="shared."; return; }catch(e){}
    }
    let copied=false; try{ await navigator.clipboard.writeText(txt); copied=true; }catch(e){}
    note.textContent=copied?"result copied — paste it anywhere. ":"";
    const a=document.createElement("a"); a.href=canvas.toDataURL("image/png"); a.download="aced-result.png"; a.textContent="\u2193 download card"; a.style.cssText="color:var(--cyan)";
    note.appendChild(a);
  },"image/png");
}

function renderTitle(){
  const isDemo = PACK.source==="demo";
  app.innerHTML =
    '<div class="panel center">'+
      '<div class="eyebrow">aced arcade</div>'+
      '<h1>A roguelike you play with <span class="hl">nothing loaded</span>.</h1>'+
      '<p class="lede">Answer to bank chips, beat the rising <b>PAR</b> each ante, survive all '+ANTES+'. In a <b>STUDY RUN</b> you also set your <b>conviction</b> before answering — so every hand trains calibration.</p>'+
      '<div class="packline">'+esc(PACK.title)+'</div>'+
      '<div class="packexam">'+(PACK.exam?esc(PACK.exam):"")+' · '+PACK.questions.length+' questions'+(isDemo?" (demo)":"")+'</div>'+
      (isDemo?'<p class="subtle">No pack loaded — you’re on the built-in demo quiz. Load one from the <a style="color:var(--cyan)" href="store.html">store</a>, or pass <b>?pack=packs/cpa.json</b>.</p>':'')+
      '<div class="modes">'+
        '<div class="modecard pure" id="pureCard"><div class="mt">▶ PURE PLAY</div><div class="md">Just the game. Answer fast, chase the streak multiplier, beat the antes.</div></div>'+
        '<div class="modecard study" id="studyCard"><div class="mt">⚑ STUDY RUN</div><div class="md">Set conviction, read the explanation after every hand, and get a calibration score at the end.</div></div>'+
      '</div>'+
    '</div>'+
    '<footer>ACED · a CRT study terminal · <a href="index.html">home</a> · <a href="store.html">store</a> · <a href="library.html">pack library</a> · <a href="importer.html">build a pack</a></footer>';
  document.getElementById("pureCard").onclick=()=>{ STUDY=false; newRun(); };
  document.getElementById("studyCard").onclick=()=>{ STUDY=true; newRun(); };
}

function renderError(msg){
  app.innerHTML='<div class="panel center">'+
    '<div class="eyebrow" style="color:var(--red)">pack error</div>'+
    '<h1>Couldn’t load that pack.</h1>'+
    '<p class="lede">'+esc(msg)+'</p>'+
    '<p class="subtle">Try <a style="color:var(--cyan)" href="aced-arcade.html?pack=packs/cpa.json">the CPA pack</a>, the built-in <a style="color:var(--cyan)" href="aced-arcade.html">demo</a>, or browse the <a style="color:var(--cyan)" href="store.html">store</a>.</p>'+
    '</div>';
}

(async function boot(){
  const res = await loadPack();
  if(res.error){ renderError(res.error); return; }
  PACK = res;
  // deep-link: ?study=1 starts a study run immediately; ?pure=1 a pure run
  if(params.get("study")==="1"){ STUDY=true; newRun(); return; }
  if(params.get("pure")==="1"){ STUDY=false; newRun(); return; }
  renderTitle();
})();
</script>
<button id="readfab" title="Reading comfort" aria-label="Reading comfort">Aa</button>
<div id="readpanel" hidden>
  <h4>READING</h4>
  <label><input type="checkbox" id="rk1"> Dim the CRT glow</label>
  <label><input type="checkbox" id="rk2"> Bigger text</label>
  <div class="hint">Easier on the eyes for long sessions. Saved on this device.</div>
</div>
<script>(function(){
  var fab=document.getElementById("readfab"),p=document.getElementById("readpanel"),
      k1=document.getElementById("rk1"),k2=document.getElementById("rk2"),de=document.documentElement;
  if(!fab||!p) return;
  function set(k,v){try{localStorage.setItem(k,v);}catch(e){}}
  k1.checked=de.classList.contains("aced-read"); k2.checked=de.classList.contains("aced-zoom");
  fab.addEventListener("click",function(e){ e.stopPropagation(); p.hidden=!p.hidden; });
  k1.addEventListener("change",function(){ de.classList.toggle("aced-read",k1.checked); set("aced_read",k1.checked?"1":"0"); });
  k2.addEventListener("change",function(){ de.classList.toggle("aced-zoom",k2.checked); set("aced_zoom",k2.checked?"1":"0"); });
  document.addEventListener("click",function(e){ if(!p.hidden && !p.contains(e.target) && e.target!==fab) p.hidden=true; });
})();</script>
